// ─── PHOTO SCENE HELPER ────────────────────────────────────────────────────
function photoScene(url, caption) {
  return {
    caption,
    isPhoto: true,
    scene: () => (
      <img src={url} alt={caption}
        style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:"center 25%",display:"block"}}
        loading="lazy"
      />
    )
  };
}

// ─── COLLEGE CARD ──────────────────────────────────────────────────────────
function hexToRgba(hex, alpha) {
  try {
    let h = (hex||'').replace('#','');
    if(h.length===3) h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
    const r=parseInt(h.slice(0,2),16), g=parseInt(h.slice(2,4),16), b=parseInt(h.slice(4,6),16);
    return 'rgba('+r+','+g+','+b+','+alpha+')';
  } catch(e) { return 'rgba(0,0,0,'+alpha+')'; }
}

// ─── WHY NOTE INPUT ───────────────────────────────────────────────────────
function WhyNoteInput({ value, onChange, onDone, placeholder, compact }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(value);
  const inputRef = useRef(null);
  useEffect(() => { setDraft(value); }, [value]);
  const commit = () => {
    onChange(draft.trim());
    setEditing(false);
    if(onDone) onDone();
  };
  if(compact) {
    if(!editing && !draft) return (
      <div onClick={()=>{setEditing(true);setTimeout(()=>inputRef.current?.focus(),50);}}
        style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:10,color:"rgba(212,175,55,0.3)",cursor:"pointer",marginTop:3,letterSpacing:"0.01em"}}>
        + Why this one?
      </div>
    );
    if(!editing && draft) return (
      <div onClick={()=>{setEditing(true);setTimeout(()=>inputRef.current?.focus(),50);}}
        style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:11,fontStyle:"italic",color:"rgba(255,224,140,0.6)",cursor:"pointer",marginTop:3,lineHeight:1.45,borderLeft:"1.5px solid rgba(212,175,55,0.22)",paddingLeft:7}}>
        {draft}
      </div>
    );
    return (
      <textarea ref={inputRef} value={draft} onChange={e=>setDraft(e.target.value)}
        onBlur={commit}
        onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();commit();}}}
        placeholder="Why this one?"
        rows={2}
        style={{width:"100%",background:"transparent",border:"none",borderBottom:"1px solid rgba(212,175,55,0.25)",borderRadius:0,padding:"4px 0",color:"rgba(255,232,160,0.85)",fontFamily:"'Source Sans 3',sans-serif",fontSize:11,fontStyle:"italic",outline:"none",resize:"none",boxSizing:"border-box",marginTop:3,lineHeight:1.45}}
        autoFocus
      />
    );
  }
  // Full mode — iMessage-style, no border box, no Save button
  return (
    <textarea ref={inputRef} value={draft} onChange={e=>setDraft(e.target.value)}
      onBlur={commit}
      onFocus={e=>{setTimeout(()=>e.target.scrollIntoView({behavior:"smooth",block:"center"}),300);}}
      onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();commit();}}}
      placeholder={placeholder||"What stood out to you..."}
      rows={2}
      autoFocus
      style={{width:"100%",background:"transparent",border:"none",borderBottom:"1px solid rgba(212,175,55,0.3)",borderRadius:0,padding:"6px 0",color:"rgba(255,232,160,0.9)",fontFamily:"'Source Sans 3',sans-serif",fontSize:12,fontStyle:"italic",outline:"none",resize:"none",boxSizing:"border-box",lineHeight:1.5}}
    />
  );
}

// ─── HAPTIC FEEDBACK ──────────────────────────────────────────────────────
const haptic = (pattern) => {
  try { if(navigator.vibrate) navigator.vibrate(pattern); } catch(e) {}
};
// Patterns
const HAPTIC = {
  tap:    8,        // light tap — button press
  soft:   [6,30,6], // double soft — skip/maybe toggle
  success:[10,40,20], // success — interested
  swipe:  15,       // swipe navigation
  flip:   12,       // card flip
};

function CollegeCard({ school, flipped, onFlip, triageStatus, onSkip, onMaybe, onInterested, onRemove }) {

      const track = el.parentNode?.querySelector('.bsb-track');
      const thumb = el.parentNode?.querySelector('.bsb-thumb');
      if(!track||!thumb) return;
      const trackH = track.clientHeight;
      const thumbH = Math.max(24, trackH*(el.clientHeight/el.scrollHeight));
      thumb.style.height = thumbH+'px';
      thumb.style.top = '0px';
    };
    setTimeout(setThumb, 150);
  }, [flipped, school.id]);

  useEffect(() => { setPhotoIdx(0); }, [school.id]);
  useEffect(() => {
    const t = setInterval(() => {
      setFading(true);
      setTimeout(() => { setPhotoIdx(p => (p+1) % school.scenes.length); setFading(false); }, 500);
    }, 3800);
    return () => clearInterval(t);

  const handleCardClick = e => {

    if(e.target.closest('a,button,select,input,svg,polyline,line,path')) return;
    onFlip(!flipped);

  const doShare = e => {
    e.stopPropagation();
    track("school_shared", { school_id: school.id, school_name: school.name });

      " | " + (school.stats.find(s=>s.label==="Tuition (Full)")?.value||"") +
      " | collegecards.app";
    const copyFallback = () => {
      const ta = document.createElement("textarea");
      ta.value = txt; ta.style.cssText = "position:fixed;top:0;left:0;opacity:0;";
      document.body.appendChild(ta); ta.focus(); ta.select();
      try { document.execCommand("copy"); setShareMsg("Copied!"); }
      catch(e) { setShareMsg("Copy failed"); }
      document.body.removeChild(ta);
      setTimeout(() => setShareMsg(""), 2200);
    };
    if(navigator.share) { navigator.share({title:school.name,text:txt}).catch(copyFallback); }
    else { copyFallback(); }

  const Scene = school.scenes[photoIdx].scene;

  // Triage strip content

          Remove

    // Default: untriaged — show all three
    return (
      <div style={{display:"flex",width:"100%"}}>

// ─── SEARCH CARD ───────────────────────────────────────────────────────────
function SearchCard({ onResult, onSurprise, onJumpIn }) {
  const scrollContainerRef = useRef(null);
  useEffect(() => {
    const el = scrollContainerRef.current;
    if(!el) return;
    const setThumb = () => {
      const track = el.parentNode?.querySelector('.sb-track');
      const thumb = el.parentNode?.querySelector('.sb-thumb');
      if(!track||!thumb) return;
      const trackH = track.clientHeight;
      const thumbH = Math.max(30, trackH*(el.clientHeight/el.scrollHeight));
      thumb.style.height = thumbH+'px';
      thumb.style.top = '0px';
    };
    setThumb();
    const ro = new ResizeObserver(setThumb);
    ro.observe(el);
    return () => ro.disconnect();
  }, []);
  const [f, setF] = useState({region:"",state:"",states:[],setting:"",size:"",testOpt:false,d1:false,ivyPlus:false,spirit:0,acad:0,social:0,beauty:0,maxAccept:100});
  const [committed, setCommitted] = useState(100);
  const [nameQ, setNameQ] = useState("");
  const regions = {Northeast:["MA","NH","VT","CT","RI","NY","NJ","PA","ME"],South:["TN","NC","VA","GA","FL"],Midwest:["OH","IN","IL","MI","WI"],West:["CA","CO","WA","OR"]};
  const ivyPlusIds = ["harvard","princeton","yale","columbia","brown","dartmouth","cornell"];
  const d1Ids = ["bc","cornell","columbia","yale","harvard","dartmouth","brown","princeton","vanderbilt","duke","bu","tufts","lehigh","bucknell","colgate","oberlin"];
  const getRegion = loc => { for(const [r,st] of Object.entries(regions)) if(st.some(s=>loc.includes(s))) return r; return "Other"; };
  const sizeOk = (v,enroll) => { const n=parseInt((enroll||"").replace(/[^0-9]/g,"")); if(v==="Small")return n<3000; if(v==="Medium")return n>=3000&&n<=10000; if(v==="Large")return n>10000; return true; };
  const CLEAR = {region:"",state:"",states:[],setting:"",size:"",testOpt:false,d1:false,ivyPlus:false,spirit:0,acad:0,social:0,beauty:0,maxAccept:100};
  const matches = SCHOOLS.filter(s => {
    const loc = s.stats.find(x=>x.label==="Location")?.value||"";
    const set = s.stats.find(x=>x.label==="Campus Setting")?.value||"";
    const enr = s.stats.find(x=>x.label==="Undergrad Enrollment")?.value||"";
    const to  = s.stats.find(x=>x.label==="Test Optional?")?.value||"";
    const acc = parseInt((s.stats.find(x=>x.label==="Acceptance Rate")?.value||"100").replace(/[^0-9]/g,""));
    if(f.region && getRegion(loc)!==f.region) return false;
    if(f.states&&f.states.length>0 && !f.states.some(st=>loc.includes(", "+st)||loc.includes(","+st))) return false;
    if(f.setting && !set.toLowerCase().includes(f.setting.toLowerCase())) return false;
    if(f.size && !sizeOk(f.size,enr)) return false;
    if(f.testOpt && !to.includes(Yes)) return false;
    if(f.ivyPlus && !ivyPlusIds.includes(s.id)) return false;
    if(f.d1 && !d1Ids.includes(s.id)) return false;
    if(nameQ && !s.name.toLowerCase().includes(nameQ.toLowerCase()) && !s.subtitle.toLowerCase().includes(nameQ.toLowerCase())) return false;
    const g = label => s.vibes.find(v=>v.label===label)?.value||0;
    if(f.spirit>0 && g("School Spirit")<f.spirit) return false;
    if(f.acad>0   && g("Academics")<f.acad) return false;
    if(f.social>0 && g("Social Scene")<f.social) return false;
    if(f.beauty>0 && g("Campus Beauty")<f.beauty) return false;
    return true;
  });
  const Chip = ({label,active,onClick}) => (
    <div onClick={onClick} style={{padding:"4px 10px",borderRadius:16,cursor:"pointer",fontFamily:"'Source Sans 3',sans-serif",fontSize:12,fontWeight:active?700:400,background:active?"rgba(212,175,55,0.2)":"rgba(255,255,255,0.06)",border:"1px solid "+(active?"rgba(212,175,55,0.55)":"rgba(255,255,255,0.1)"),color:active?"#D4AF37":"rgba(255,255,255,0.48)",transition:"all 0.2s",userSelect:"none"}}>
      {label}
    </div>
  );
  const Toggle = ({label,k}) => (
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:12,color:"rgba(255,255,255,0.7)"}}>{label}</div>
      <div onClick={()=>setF(x=>({...x,[k]:!x[k]}))} style={{width:32,height:17,borderRadius:9,background:f[k]?"#D4AF37":"rgba(255,255,255,0.13)",cursor:"pointer",position:"relative",transition:"background 0.2s"}}>
        <div style={{position:"absolute",top:2,left:f[k]?14:2,width:13,height:13,borderRadius:"50%",background:"#fff",transition:"left 0.2s"}}/>
      </div>
    </div>
  );
  const Dots = ({k,label}) => (
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:2}}>
      <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:12,color:"rgba(255,255,255,0.7)"}}>{label}</div>
      <div style={{display:"flex",gap:3}}>
        {[1,2,3,4,5].map(v=>(
          <div key={v} onClick={()=>setF(x=>({...x,[k]:x[k]===v?0:v}))} style={{width:13,height:13,borderRadius:2,cursor:"pointer",background:v<=f[k]?"#D4AF37":"rgba(255,255,255,0.13)",transition:"background 0.2s"}}/>
        ))}
      </div>
    </div>
  );
  const acceptLabel = committed>=100?"Any":committed+"%";
  return (
    <div className="card-scene" style={{cursor:"default"}}
      onTouchStart={e=>e.stopPropagation()}
      onTouchMove={e=>e.stopPropagation()}
      onTouchEnd={e=>e.stopPropagation()}>
      <div className="card-inner">
        <div className="card-face" style={{background:"linear-gradient(160deg,#0a0d14 0%,#101520 60%,#080a10 100%)",border:"2px solid rgba(212,175,55,0.35)",boxShadow:"0 30px 80px rgba(0,0,0,0.7)",display:"flex",flexDirection:"column",cursor:"default"}}>
          <div className="shine"/>
          <div style={{flexShrink:0,padding:"12px 14px 8px",borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:15,color:"#fff"}}>🔍 Find Your Schools</div>
              <button onClick={onJumpIn} style={{background:"rgba(212,175,55,0.15)",border:"1px solid rgba(212,175,55,0.5)",borderRadius:14,padding:"4px 10px",cursor:"pointer",fontFamily:"'Source Sans 3',sans-serif",fontSize:10,color:"#D4AF37",fontWeight:700,whiteSpace:"nowrap"}}>Jump Right In →</button>
            </div>
            <input
              value={nameQ} onChange={e=>setNameQ(e.target.value)}
              placeholder="Search by school name..."
              style={{width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:8,padding:"7px 10px",color:"#fff",fontFamily:"'Source Sans 3',sans-serif",fontSize:11,outline:"none",boxSizing:"border-box"}}
            />
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:6}}>
              <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:11,color:"rgba(255,255,255,0.5)",letterSpacing:"0.06em"}}>{matches.length} matching</div>
              <button onClick={onSurprise} style={{background:"linear-gradient(135deg,rgba(212,175,55,0.18),rgba(80,80,200,0.12))",border:"1px solid rgba(212,175,55,0.35)",borderRadius:16,padding:"4px 12px",cursor:"pointer",fontFamily:"'Source Sans 3',sans-serif",fontSize:10,color:"rgba(212,175,55,0.85)",fontWeight:600,letterSpacing:"0.05em"}}>
                🎲 Surprise Me
              </button>
            </div>
          </div>
          <div style={{flex:1,minHeight:0,display:"flex",flexDirection:"row"}}>
            <div className="search-scroll" onScroll={e=>{
              const el=e.currentTarget;
              const track=el.parentNode.querySelector('.sb-track');
              const thumb=el.parentNode.querySelector('.sb-thumb');
              if(!track||!thumb) return;
              const trackH=track.clientHeight;
              const thumbH=Math.max(30, trackH*(el.clientHeight/el.scrollHeight));
              const pct=el.scrollTop/(el.scrollHeight-el.clientHeight||1);
              thumb.style.height=thumbH+'px';
              thumb.style.top=Math.round(pct*(trackH-thumbH))+'px';
            }} ref={scrollContainerRef} style={{flex:1,overflowY:"scroll",overflowX:"hidden",padding:"8px 8px 8px 14px",display:"flex",flexDirection:"column",gap:10}}>
            <div>
              <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:11,color:"rgba(255,255,255,0.65)",fontWeight:600,marginBottom:6}}>State</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                {[["MA","Massachusetts"],["NY","New York"],["NJ","New Jersey"],["PA","Pennsylvania"],["CT","Connecticut"],["NH","New Hampshire"],["VT","Vermont"],["RI","Rhode Island"],["ME","Maine"],["TN","Tennessee"],["NC","North Carolina"],["VA","Virginia"],["GA","Georgia"],["FL","Florida"],["OH","Ohio"],["IL","Illinois"],["MI","Michigan"],["WI","Wisconsin"],["IN","Indiana"],["CA","California"],["CO","Colorado"],["WA","Washington"],["OR","Oregon"],["TX","Texas"],["MD","Maryland"],["DC","DC"]].map(([abbr])=>{
                  const on=(f.states||[]).includes(abbr);
                  return <div key={abbr} onClick={()=>setF(x=>{const cur=x.states||[];return{...x,states:on?cur.filter(s=>s!==abbr):[...cur,abbr],region:""}})} style={{padding:"3px 8px",borderRadius:10,cursor:"pointer",fontFamily:"'Source Sans 3',sans-serif",fontSize:10,fontWeight:on?700:400,background:on?"rgba(212,175,55,0.22)":"rgba(255,255,255,0.06)",border:"1px solid "+(on?"rgba(212,175,55,0.6)":"rgba(255,255,255,0.1)"),color:on?"#D4AF37":"rgba(255,255,255,0.5)",userSelect:"none"}}>{abbr}</div>;
                })}
              </div>
              {(f.states&&f.states.length>0)&&<div onClick={()=>setF(x=>({...x,states:[]}))} style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:9,color:"rgba(212,175,55,0.5)",marginTop:4,cursor:"pointer",textDecoration:"underline"}}>clear</div>}
            </div>
            {[{label:"Region",key:"region",opts:["Northeast","South","Midwest","West"]},{label:"Setting",key:"setting",opts:["Urban","Suburban","Rural","Small Town"]},{label:"Size",key:"size",opts:["Small","Medium","Large"]}].map(({label,key,opts}) => (
              <div key={key}>
                <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:11,color:"rgba(255,255,255,0.65)",fontWeight:600,marginBottom:6}}>{label}</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
                  {opts.map(o=><Chip key={o} label={o} active={f[key]===o} onClick={()=>setF(x=>({...x,[key]:x[key]===o?"":o}))}/>)}
                </div>
              </div>
            ))}
            <div>
              <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:11,color:"rgba(255,255,255,0.65)",fontWeight:600,marginBottom:6}}>

              </div>
              <input type="range" min="10" max="100" step="5"
                value={f.maxAccept}
                onChange={e=>setF(x=>({...x,maxAccept:+e.target.value}))}
                onMouseUp={e=>setCommitted(f.maxAccept)}
                onTouchEnd={e=>{e.stopPropagation();setCommitted(f.maxAccept);}}
                style={{width:"100%",accentColor:"#D4AF37",cursor:"pointer"}}/>
              <div style={{display:"flex",justifyContent:"space-between",fontFamily:"'Source Sans 3',sans-serif",fontSize:7,color:"rgba(255,255,255,0.22)",marginTop:1}}>

              <Toggle label="D1 Athletics" k="d1"/>

            <div>
              <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:7,letterSpacing:"0.15em",color:"rgba(255,255,255,0.35)",textTransform:"uppercase",marginBottom:6}}>Minimum Vibe Ratings</div>
              <Dots k="spirit" label="🦅 School Spirit"/>
              <Dots k="acad"   label="📚 Academics"/>
              <Dots k="social" label="🎉 Social Scene"/>
              <Dots k="beauty" label="🏛️ Campus Beauty"/>

          <div style={{flexShrink:0,padding:"6px 14px 14px"}}>
            {matches.length>0 ? (
              <button onClick={()=>{
                track("search_used", { result_count: matches.length, filters: Object.entries(f).filter(([k,v])=>v&&v!==0&&v!==100&&v!=="").map(([k])=>k) });
                onResult(matches[0].id);
              }} style={{width:"100%",background:"rgba(212,175,55,0.15)",border:"1px solid rgba(212,175,55,0.5)",borderRadius:9,padding:"10px 0",cursor:"pointer",fontFamily:"'Source Sans 3',sans-serif",fontSize:12,fontWeight:600,color:"#D4AF37",letterSpacing:"0.08em"}}>
                Show {matches.length} School{matches.length!==1?"s":""} →

              <div style={{textAlign:"center",fontFamily:"'Source Sans 3',sans-serif",fontSize:10,color:"rgba(255,255,255,0.26)",padding:"8px 0"}}>No matches — try fewer filters</div>
            )}
            <button onClick={()=>{setF(CLEAR);setCommitted(100);}} style={{width:"100%",background:"transparent",border:"none",cursor:"pointer",fontFamily:"'Source Sans 3',sans-serif",fontSize:8,color:"rgba(255,255,255,0.2)",marginTop:4}}>
              Clear all filters
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function MyCollegesView({ boardIds, board, myStatus, onMoveStatus, onRemoveFromBoard, onExpand, skipped, onUnskip, onUnskipAll, darkMode, notes, onNoteChange }) {
  const getStatus = id => {
    if(myStatus.applied.includes(id)) return "applied";
    if(myStatus.applying.includes(id)) return "applying";
    return "interested";
  };
  const getLane = id => {
    if(board.reach.includes(id)) return {label:"REACH",color:"#e05050"};
    if(board.match.includes(id)) return {label:"MATCH",color:"#D4AF37"};
    if(board.safety.includes(id)) return {label:"SAFETY",color:"#50c878"};
    return {label:"TBD",color:"#8888aa"};
  };
  const buckets = [
    {key:"interested",label:"❤️ Interested",color:"#50c878",bg:"rgba(50,200,100,0.08)",border:"rgba(50,200,100,0.25)"},
    {key:"applying",  label:"📝 Applying",  color:"#f09050",bg:"rgba(240,144,80,0.08)",border:"rgba(240,144,80,0.25)"},
    {key:"applied",   label:"✅ Applied",   color:"#7BE5A1",bg:"rgba(123,229,161,0.08)",border:"rgba(123,229,161,0.25)"},
  ];
  if(boardIds.length===0) return (
    <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14,padding:40}}>
      <div style={{fontSize:44}}>🎓</div>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:darkMode?"rgba(255,255,255,0.4)":"rgba(0,0,0,0.35)",textAlign:"center"}}>No schools yet</div>
      <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:12,color:darkMode?"rgba(255,255,255,0.28)":"rgba(0,0,0,0.35)",textAlign:"center",maxWidth:280,lineHeight:1.6}}>
        Tap <strong style={{color:"#50c878"}}>❤️ Interested</strong> on any card while browsing.
      </div>
    </div>
  );
  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{flex:1,overflowY:"auto",padding:"10px 12px 28px"}}>
        {boardIds.length>0 && Object.keys(notes||{}).filter(k=>boardIds.includes(k)&&notes[k]).length===0 && (
          <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:11,color:"rgba(212,175,55,0.4)",textAlign:"center",padding:"8px 0 4px",letterSpacing:"0.02em"}}>
            ✏️ Add notes to remember why you liked each school
          </div>
        )}
        {buckets.map(bucket => {
          const ids = boardIds.filter(id => getStatus(id)===bucket.key);
          if(ids.length===0) return null;
          return (
            <div key={bucket.key} style={{marginBottom:14}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 14px",background:bucket.bg,border:"2px solid "+bucket.border,borderRadius:10,marginBottom:8}}>
                <div style={{fontFamily:"'Source Sans 3',sans-serif",fontWeight:900,fontSize:15,color:bucket.color,letterSpacing:"0.06em"}}>{bucket.label}</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:bucket.color,fontWeight:900}}>{ids.length}</div>
              </div>
              {ids.map(id => {
                const school = SCHOOLS.find(s=>s.id===id);
                if(!school) return null;
                const lane = getLane(id);
                const status = getStatus(id);
                const statusColor = {interested:"#50c878",applying:"#f09050",applied:"#7BE5A1"}[status];
                return (
                  <div key={id} onClick={()=>onExpand(id)} style={{background:"linear-gradient(135deg,"+school.gradFrom+","+school.primaryColor+")",border:"2px solid "+lane.color+"55",borderRadius:12,padding:"10px 12px",marginBottom:8,boxShadow:"0 4px 16px rgba(0,0,0,0.35)",cursor:"pointer"}}>

                        <div style={{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:14,color:"#fff",lineHeight:1.1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{school.name}</div>
                        <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:9,color:school.accentColor,marginTop:2,letterSpacing:"0.06em",textTransform:"uppercase"}}>{school.subtitle}</div>
                      </div>

                      ))}
                    </div>
                    <div onClick={e=>e.stopPropagation()} style={{marginBottom:6}}>
                      <WhyNoteInput compact value={notes&&notes[id]||""} onChange={v=>onNoteChange(id,v)} placeholder="Why this one?"/>
                    </div>
                    <div style={{display:"flex",gap:6}} onClick={e=>e.stopPropagation()}>
                      <select value={status} onChange={e=>onMoveStatus(id,e.target.value)} style={{flex:1,background:"rgba(0,0,0,0.3)",border:"1px solid "+statusColor+"55",borderRadius:8,color:statusColor,fontFamily:"'Source Sans 3',sans-serif",fontSize:11,padding:"5px 8px",cursor:"pointer",outline:"none",fontWeight:700}}>
                        <option value="interested">❤️ Interested</option>
                        <option value="applying">📝 Applying</option>
                        <option value="applied">✅ Applied</option>
                      </select>
                      <button onClick={()=>onRemoveFromBoard(id)} style={{background:"rgba(255,40,40,0.1)",border:"1px solid rgba(255,60,60,0.2)",borderRadius:8,padding:"5px 10px",cursor:"pointer",fontFamily:"'Source Sans 3',sans-serif",fontSize:10,color:"rgba(255,100,100,0.7)"}}>✕</button>
                    </div>
                  </div>
                );
              })}
            </div>
          );
        })}
        {skipped&&skipped.length>0&&(
          <div style={{marginTop:8,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:10,padding:"10px 12px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
              <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:9,letterSpacing:"0.12em",color:"rgba(255,255,255,0.3)",textTransform:"uppercase"}}>Skipped ({skipped.length})</div>
              <button onClick={onUnskipAll} style={{background:"transparent",border:"none",cursor:"pointer",fontFamily:"'Source Sans 3',sans-serif",fontSize:9,color:"rgba(212,175,55,0.5)"}}>Restore all</button>
            </div>
            {skipped.map(id=>{const s=SCHOOLS.find(x=>x.id===id);if(!s)return null;return(
              <div key={id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                <span style={{fontSize:16,opacity:0.5}}>{s.mascot}</span>
                <div style={{flex:1,fontFamily:"'Playfair Display',serif",fontSize:11,color:"rgba(255,255,255,0.3)"}}>{s.name}</div>
                <button onClick={()=>onUnskip(id)} style={{background:"rgba(80,200,120,0.08)",border:"1px solid rgba(80,200,120,0.2)",borderRadius:5,padding:"2px 8px",cursor:"pointer",fontFamily:"'Source Sans 3',sans-serif",fontSize:8,color:"#50c878",fontWeight:600}}>+ Restore</button>
              </div>
            );})}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── MAIN APP ──────────────────────────────────────────────────────────────
// ─── ANALYTICS ────────────────────────────────────────────────────────────
// Analytics — PostHog loaded via <head> snippet
function track(event, props={}) {
  try {
    if(window.posthog && window.posthog.capture) {
      window.posthog.capture(event, props);
    }
  } catch(e) {}
}

function CollegeCards() {
  const [view, setView] = useState("browse");
  const [seqIdx, setSeqIdx] = useState(0);
  const [cardFlipped, setCardFlipped] = useState(false);

  // Responsive card — fills mobile viewport, desktop stays at 1x
  const [cardScale, setCardScale] = useState(1);
  const [darkMode, setDarkMode] = useState(true);
  useEffect(() => {
    const update = () => {
      if(window.innerWidth > 500) { setCardScale(1); return; }
      const avH = window.innerHeight - 65 - 55 - 20;
      const avW = window.innerWidth - 16;
      const s = Math.min(1.25, avH / 530, avW / 340);
      setCardScale(Math.max(0.7, s));
    };
    update();
    window.addEventListener('resize', update);
    return () => window.removeEventListener('resize', update);
  }, []);
  // localStorage-backed state — auto-saves on every change, restores on load
  const load = (key, fallback) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch(e) { return fallback; } };
  const save = (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {} };

  const [board, setBoard] = useState(() => load("cc_board", {reach:[],match:[],safety:[],undecided:[],rankOrder:[]}));
  const [notes, setNotes] = useState(() => load("cc_notes", {}));
  const [whyPrompt, setWhyPrompt] = useState(null); // id of school to prompt
  const [triage, setTriage] = useState(() => load("cc_triage", {maybe:[], skipped:[]}));
  const [myStatus, setMyStatus] = useState(() => load("cc_mystatus", {applying:[], applied:[]}));

  useEffect(() => save("cc_board", board), [board]);
  useEffect(() => save("cc_triage", triage), [triage]);
  useEffect(() => save("cc_notes", notes), [notes]);
  useEffect(() => save("cc_mystatus", myStatus), [myStatus]);
  const [expandId, setExpandId] = useState(null);
  const [showFeedback, setShowFeedback] = useState(false);
  const [fbText, setFbText] = useState("");
  const [fbSent, setFbSent] = useState(false);
  const touchStart = useRef(null);
  const touchStartY = useRef(null);
  const sessionViews = useRef(0); // cards viewed this session
  const sessionTriaged = useRef(0); // schools triaged this session

  // Init analytics + track session start
  useEffect(() => {
    track("session_start", {
      returning: !!localStorage.getItem("cc_visited"),
      last_visit: localStorage.getItem("cc_last_visit") || null,
    });
    const now = Date.now();
    const last = localStorage.getItem("cc_last_visit");
    if(last && (now - parseInt(last)) < 7*24*60*60*1000) {
      track("returned_within_7_days", { days_since: Math.floor((now-parseInt(last))/(24*60*60*1000)) });
    }
    localStorage.setItem("cc_visited", "1");
    localStorage.setItem("cc_last_visit", String(now));

    // Track session depth when user leaves
    const handleLeave = () => {
      track("session_end", {
        cards_viewed: sessionViews.current,
        schools_triaged: sessionTriaged.current,
        board_size: allBoardIds.length,
      });
    };
    window.addEventListener("pagehide", handleLeave);
    document.addEventListener("visibilitychange", () => {
      if(document.visibilityState === "hidden") handleLeave();
    });
    return () => window.removeEventListener("pagehide", handleLeave);
  }, []);

  const allBoardIds = [...board.reach,...board.match,...board.safety,...board.undecided];

  const visibleSeq = SEQ;

  const cur = visibleSeq[seqIdx % visibleSeq.length];
  const school = cur?.t==="school" ? cur.s : null;
  const activeId = school?.id;

  const prev = () => setSeqIdx(i => {
    const n = (i-1+visibleSeq.length)%visibleSeq.length;
    const item = visibleSeq[n];
    if(item?.t !== "school") setCardFlipped(false);
    if(item?.t === "school") {
      sessionViews.current++;
      track("card_viewed", { school_id: item.s.id, school_name: item.s.name, direction: "prev", session_card_count: sessionViews.current });
    }
    return n;
  });
  const next = () => setSeqIdx(i => {
    const n = (i+1)%visibleSeq.length;
    const item = visibleSeq[n];
    if(item?.t !== "school") setCardFlipped(false);
    if(item?.t === "school") {
      sessionViews.current++;
      track("card_viewed", { school_id: item.s.id, school_name: item.s.name, direction: "next", session_card_count: sessionViews.current });
    }
    return n;
  });
  const surpriseMe = () => {
    const schoolItems = visibleSeq.filter(x=>x.t==="school");
    if(!schoolItems.length) return;
    const pick = schoolItems[Math.floor(Math.random()*schoolItems.length)];
    const idx = visibleSeq.indexOf(pick);
    setSeqIdx(idx);
  };

  useEffect(() => {
    const h = e => {
      if(view!=="browse"||showFeedback) return;
      if(e.key==="ArrowLeft") prev();
      if(e.key==="ArrowRight") next();
    };
    window.addEventListener("keydown",h);
    return () => window.removeEventListener("keydown",h);
  }, [view,showFeedback,visibleSeq.length]);

  // Triage actions
  const markInterested = id => {
    if(allBoardIds.includes(id)) return;
    setBoard(b=>({...b,undecided:[...b.undecided,id],rankOrder:[...b.rankOrder,id]}));
    setTriage(t=>({...t,maybe:t.maybe.filter(x=>x!==id),skipped:t.skipped.filter(x=>x!==id)}));
    sessionTriaged.current++;
    track("school_triaged", { school_id: id, action: "interested", board_size: allBoardIds.length+1, session_views: sessionViews.current });
    setCardFlipped(false);
    setTimeout(() => setWhyPrompt(id), 800);
  };
  const markMaybe = id => {
    if(triage.maybe.includes(id)) {
      setTriage(t=>({...t,maybe:t.maybe.filter(x=>x!==id)}));
      track("school_triaged", { school_id: id, action: "unmaybe", session_views: sessionViews.current });
    } else {
      setTriage(t=>({...t,maybe:[...t.maybe,id],skipped:t.skipped.filter(x=>x!==id)}));
      sessionTriaged.current++;
      track("school_triaged", { school_id: id, action: "maybe", session_views: sessionViews.current });
      setCardFlipped(false);
    }
  };
  const markSkip = id => {
    if(triage.skipped.includes(id)) {
      setTriage(t=>({...t,skipped:t.skipped.filter(x=>x!==id)}));
    } else {
      setTriage(t=>({...t,skipped:[...t.skipped,id],maybe:t.maybe.filter(x=>x!==id)}));
      sessionTriaged.current++;
      setCardFlipped(false);
    }
    track("school_triaged", { school_id: id, action: "skip", session_views: sessionViews.current });
  };
  const unSkipAll = () => setTriage(t=>({...t,skipped:[]}));
  const unSkip = id => setTriage(t=>({...t,skipped:t.skipped.filter(x=>x!==id)}));

  // Board actions
  const removeFromBoard = id => {
    setBoard(b=>({reach:b.reach.filter(x=>x!==id),match:b.match.filter(x=>x!==id),safety:b.safety.filter(x=>x!==id),undecided:b.undecided.filter(x=>x!==id),rankOrder:b.rankOrder.filter(x=>x!==id)}));
  };
  const moveLane = (id,toLane) => {
    setBoard(b=>{const c={reach:b.reach.filter(x=>x!==id),match:b.match.filter(x=>x!==id),safety:b.safety.filter(x=>x!==id),undecided:b.undecided.filter(x=>x!==id),rankOrder:b.rankOrder};return{...c,[toLane]:[...c[toLane],id]};});
    if(toLane !== "undecided") track("school_classified", { school_id: id, lane: toLane, board_size: allBoardIds.length });
    // Fire board_completed when last TBD gets classified
    if(toLane !== "undecided" && board.undecided.filter(x=>x!==id).length === 0 && allBoardIds.length > 0) {
      track("board_completed", { board_size: allBoardIds.length, reach: board.reach.length, match: board.match.length, safety: board.safety.length });
    }
  };
  const reorder = (id,lane,to) => setBoard(b=>{const a=b[lane].filter(x=>x!==id);a.splice(to,0,id);return{...b,[lane]:a};});
  const rankReorder = (id,to) => setBoard(b=>{const a=b.rankOrder.filter(x=>x!==id);a.splice(Math.max(0,Math.min(to,a.length)),0,id);return{...b,rankOrder:a};});
  const rankMove = (id,dir) => setBoard(b=>{const a=[...b.rankOrder];const i=a.indexOf(id);const j=i+dir;if(i<0||j<0||j>=a.length)return b;[a[i],a[j]]=[a[j],a[i]];return{...b,rankOrder:a};});

  // My status actions
  const moveStatus = (id, toStage) => {
    setMyStatus(m=>{
      const cleaned={applying:m.applying.filter(x=>x!==id),applied:m.applied.filter(x=>x!==id)};
      if(toStage==="interested") return cleaned; // just remove from applying/applied
      return{...cleaned,[toStage]:[...cleaned[toStage],id]};
    });
  };

  const jumpTo = id => {
    const idx = visibleSeq.findIndex(x=>x.t==="school"&&x.s.id===id);
    if(idx>=0){setSeqIdx(idx);setView("browse");}
  };
  const shortName = s => s.id==="bc"?"BC":s.id==="bu"?"BU":s.id==="berklee"?"Berklee":s.name.split(" ")[0];
  const totalBoard = allBoardIds.length;
  const totalMy = allBoardIds.length; // same — My Colleges IS the board list

  const handleTouchStart = e => { touchStart.current = e.touches[0].clientX; touchStartY.current = e.touches[0].clientY; };
  const handleTouchEnd = e => {
    if(touchStart.current===null) return;
    const dx = e.changedTouches[0].clientX - touchStart.current;
    touchStart.current = null;
    const dy = e.changedTouches[0].clientY - (touchStartY.current||0);
    if(Math.abs(dx)<60 || Math.abs(dx)<Math.abs(dy)*1.5) return;
    haptic(HAPTIC.swipe); if(dx<0) next(); else prev();
  };

  const isInterested = school && allBoardIds.includes(school.id);
  const isMaybe = school && triage.maybe.includes(school.id);
  const isSkipped = school && triage.skipped.includes(school.id);
  const isTriaged = isInterested || isMaybe || isSkipped;

  const triageStatus = school
    ? allBoardIds.includes(school.id) ? "interested"
    : triage.maybe.includes(school.id) ? "maybe"
    : triage.skipped.includes(school.id) ? "skipped"
    : null
    : null;

  const CSS = [
    '',
    '    @import url(\'https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@300;400;600&display=swap\');',
    '    body{overscroll-behavior:none;overflow-x:hidden;}',
    '    .card-scene{width:340px;height:530px;perspective:1200px;cursor:pointer;touch-action:pan-y;}',
    '    .card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.75s cubic-bezier(0.4,0.2,0.2,1);}',
    '    .card-inner.flipped{transform:rotateY(180deg);}',

    '    .card-back-face{transform:rotateY(180deg);}',
    '    .card-scene:hover .card-inner:not(.flipped){transform:rotateY(5deg) rotateX(-2deg) scale(1.01);}',
    '    .card-scene:hover .card-inner.flipped{transform:rotateY(185deg) rotateX(-2deg) scale(1.01);}',
    '    .scene-wrap{width:100%;height:100%;transition:opacity 0.5s ease;}',
    '    .scene-wrap.fading{opacity:0;}',
    '    .shine{position:absolute;inset:0;background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,0.06) 50%,transparent 60%);pointer-events:none;z-index:2;}',
    '    .dot{width:6px;height:6px;border-radius:50%;transition:background 0.3s;cursor:pointer;}',
    '    .btn-skip,.btn-maybe,.btn-int{transition:all 0.15s;}',
    '    @media(hover:hover){.btn-skip:hover{border-color:rgba(255,80,80,0.7);background:rgba(80,15,20,0.8)!important;}.btn-maybe:hover{border-color:rgba(233,196,88,0.75);}.btn-int:hover{opacity:0.9;}}',
    '    .stab{cursor:pointer;transition:all 0.18s;border-radius:7px;padding:4px 8px;font-family:\'Source Sans 3\',sans-serif;font-size:9px;letter-spacing:0.06em;text-transform:uppercase;border:1px solid transparent;white-space:nowrap;}',
    '    .stab:hover{opacity:0.88;}',
    '    .tab-btn{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;flex:1;position:relative;}',
    '    .tab-badge{position:absolute;top:2px;right:calc(50% - 18px);background:#e05050;border-radius:10px;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;font-weight:700;padding:0 3px;}',
    '    ::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:2px;}',
    '    .search-scroll::-webkit-scrollbar{display:none;}',
    '    .search-scroll{scrollbar-width:none;}',
    '    .back-scroll::-webkit-scrollbar{display:none;}',
    '    .back-scroll{scrollbar-width:none;}' ,

  ].join("\n");
  const NavTab = ({id, icon, label, badge}) => {
    const active = view===id;
    return (
      <button className="tab-btn" onClick={()=>setView(id)}>
        {badge>0 && <span className="tab-badge">{badge}</span>}
        <span style={{fontSize:22}}>{icon}</span>
        <span style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:10,fontWeight:active?700:400,color:active?"#D4AF37":"rgba(255,255,255,0.7)",letterSpacing:"0.05em"}}>{label}</span>
        {active && <div style={{position:"absolute",bottom:0,left:"50%",transform:"translateX(-50%)",width:20,height:2,background:"#D4AF37",borderRadius:1}}/>}
      </button>
    );
  };

  return (
    <div style={{display:"flex",justifyContent:"center",minHeight:"100vh",background:"#000"}}>
    <div style={{width:"100%",maxWidth:430,minHeight:"100vh",maxHeight:"100vh",background:darkMode?"radial-gradient(ellipse at 55% 40%,#120808 0%,#080510 50%,#000 100%)":"linear-gradient(180deg,#f0ece4 0%,#e8e2d8 100%)",display:"flex",flexDirection:"column",overflowX:"hidden",position:"relative"}}>
      <style>{CSS}</style>

      {expandId && <FullCardModal schoolId={expandId} onClose={()=>setExpandId(null)}/>}

      {showFeedback && (
        <div onClick={()=>setShowFeedback(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.82)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:20}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#141420",border:"1px solid rgba(212,175,55,0.4)",borderRadius:14,padding:22,maxWidth:340,width:"100%"}}>
            {fbSent ? (
              <div style={{textAlign:"center",padding:"14px 0"}}>
                <div style={{fontSize:34,marginBottom:10}}>🙏</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:"#D4AF37",marginBottom:6}}>Thank you!</div>
                <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:11,color:"rgba(255,255,255,0.45)"}}>Your feedback helps us improve.</div>
                <button onClick={()=>{setShowFeedback(false);setFbSent(false);setFbText("");}} style={{marginTop:14,background:"rgba(212,175,55,0.15)",border:"1px solid rgba(212,175,55,0.4)",borderRadius:7,padding:"7px 18px",cursor:"pointer",color:"#D4AF37",fontFamily:"'Source Sans 3',sans-serif",fontSize:11}}>Close</button>
              </div>
            ) : (
              <>
                <div style={{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:17,color:"#fff",marginBottom:5}}>Share Feedback</div>
                <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:10,color:"rgba(255,255,255,0.38)",marginBottom:12}}>What would make CollegeCards better for you?</div>
                <textarea value={fbText} onChange={e=>setFbText(e.target.value)} placeholder="Ideas, bugs, missing schools..." style={{width:"100%",minHeight:80,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.14)",borderRadius:7,padding:9,color:"#fff",fontFamily:"'Source Sans 3',sans-serif",fontSize:11,resize:"vertical",boxSizing:"border-box",outline:"none"}}/>
                <div style={{display:"flex",gap:7,marginTop:9}}>
                  <button onClick={()=>setShowFeedback(false)} style={{flex:1,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:7,padding:"8px 0",cursor:"pointer",color:"rgba(255,255,255,0.38)",fontFamily:"'Source Sans 3',sans-serif",fontSize:11}}>Cancel</button>
                  <button onClick={()=>{if(fbText.trim())setFbSent(true);}} style={{flex:2,background:"rgba(212,175,55,0.15)",border:"1px solid rgba(212,175,55,0.5)",borderRadius:7,padding:"8px 0",cursor:"pointer",color:"#D4AF37",fontFamily:"'Source Sans 3',sans-serif",fontSize:11,fontWeight:600}}>Send →</button>
                </div>
              </>
            )}
          </div>
        </div>
      )}

      {/* SLIM TOP BAR */}
      <div style={{flexShrink:0,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 10px",borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
        <div style={{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:20,color:darkMode?"#fff":"#1a1208",letterSpacing:"0.04em",cursor:"pointer",flexShrink:0}} onClick={()=>{setSeqIdx(0);setView("browse");}}>
          College<span style={{color:"#D4AF37"}}>Cards</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
          <button onClick={()=>{const idx=visibleSeq.findIndex(x=>x.t==="search");if(idx>=0)setSeqIdx(idx);setView("browse");}}
            style={{background:"rgba(212,175,55,0.12)",border:"1.5px solid rgba(212,175,55,0.45)",borderRadius:20,padding:"6px 11px",cursor:"pointer",fontFamily:"'Source Sans 3',sans-serif",fontSize:11,color:"#D4AF37",fontWeight:600,display:"flex",alignItems:"center",gap:4,flexShrink:0,whiteSpace:"nowrap"}}>
            🔍 Search
          </button>
          <div style={{display:"flex",gap:8,alignItems:"flex-start"}}>
            <div onClick={()=>setView("browse")} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer"}}>
              <div style={{background:view==="browse"?"rgba(212,175,55,0.12)":"rgba(255,255,255,0.06)",border:"2px solid "+(view==="browse"?"#D4AF37":darkMode?"rgba(255,255,255,0.22)":"rgba(0,0,0,0.18)"),borderRadius:8,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",fontSize:19}}>🏫</div>
              <span style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:8,color:view==="browse"?"#D4AF37":darkMode?"rgba(255,255,255,0.4)":"rgba(0,0,0,0.5)",fontWeight:700,letterSpacing:"0.04em"}}>BROWSE</span>
            </div>
            <div onClick={()=>setView("board")} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer",position:"relative"}}>
              <div style={{background:"rgba(255,255,255,0.06)",border:"2px solid "+(view==="board"?"#D4AF37":darkMode?"rgba(255,255,255,0.22)":"rgba(0,0,0,0.18)"),borderRadius:8,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",fontSize:19}}>📋</div>
              <span style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:8,color:view==="board"?"#D4AF37":darkMode?"rgba(255,255,255,0.4)":"rgba(0,0,0,0.5)",fontWeight:700,letterSpacing:"0.04em"}}>BOARD</span>
              {totalBoard>0 && <span style={{position:"absolute",top:-5,right:-5,background:"#e05050",borderRadius:10,minWidth:16,height:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:"#fff",fontWeight:700,padding:"0 3px"}}>{totalBoard}</span>}
            </div>
            <div onClick={()=>setView("my")} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer"}}>
              <div style={{background:"rgba(255,255,255,0.06)",border:"2px solid "+(view==="my"?"#D4AF37":darkMode?"rgba(255,255,255,0.22)":"rgba(0,0,0,0.18)"),borderRadius:9,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,filter:"drop-shadow(0 0 6px rgba(255,255,255,0.7))"}}>🎓</div>
              <span style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:8,color:view==="my"?"#D4AF37":darkMode?"rgba(255,255,255,0.4)":"rgba(0,0,0,0.5)",fontWeight:700,letterSpacing:"0.04em"}}>MY SCHOOLS</span>
            </div>
          </div>
          <button onClick={()=>setDarkMode(d=>!d)} style={{background:"rgba(128,128,128,0.1)",border:"1px solid rgba(128,128,128,0.2)",borderRadius:18,padding:"5px 9px",cursor:"pointer",fontSize:14,flexShrink:0,lineHeight:1}}>{darkMode?"☀️":"🌙"}</button>
        </div>
      </div>

      {/* BROWSE */}
      {view==="browse" && (
        <div onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}
          style={{flex:1,overflowY:"auto",overflowX:"hidden",display:"flex",flexDirection:"column",alignItems:"center",padding:"12px 10px 12px"}}>
          {/* Card with overlaid arrows */}
          <div style={{position:"relative",width:340}}>
            <button onClick={prev} style={{position:"absolute",left:-14,top:240,zIndex:10,background:"rgba(0,0,0,0.6)",border:"1px solid rgba(255,255,255,0.18)",borderRadius:"50%",width:30,height:30,cursor:"pointer",color:"#fff",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
            {cur?.t==="welcome" && (
              <div style={{transform:`scale(${cardScale})`,transformOrigin:"top center",width:340,height:530,marginBottom:`${530*(cardScale-1)}px`}}>
                <WelcomeCard onDismiss={next}/>
              </div>
            )}
            {cur?.t==="search"  && (
              <div style={{transform:`scale(${cardScale})`,transformOrigin:"top center",width:340,height:530,marginBottom:`${530*(cardScale-1)}px`}}>
                <SearchCard onResult={id=>{jumpTo(id);}} onSurprise={()=>{surpriseMe();next();}} onJumpIn={()=>next()}/>
              </div>
            )}
            {cur?.t==="ad"      && (
              <div style={{transform:`scale(${cardScale})`,transformOrigin:"top center",width:340,height:530,marginBottom:`${530*(cardScale-1)}px`}}>
                <AdCard ad={cur.ad}/>
              </div>
            )}
            {cur?.t==="school"  && (
              <div style={{transform:`scale(${cardScale})`,transformOrigin:"top center",width:340,height:530,marginBottom:`${530*(cardScale-1)}px`}}>
                <CollegeCard key={school.id} school={school} flipped={cardFlipped} onFlip={setCardFlipped}
                  triageStatus={triageStatus}
                  onSkip={()=>markSkip(school.id)}
                  onMaybe={()=>markMaybe(school.id)}
                  onInterested={()=>markInterested(school.id)}
                  onRemove={()=>removeFromBoard(school.id)}
                />
              </div>
            )}
            <button onClick={next} style={{position:"absolute",right:-14,top:240,zIndex:10,background:"rgba(0,0,0,0.6)",border:"1px solid rgba(255,255,255,0.18)",borderRadius:"50%",width:30,height:30,cursor:"pointer",color:"#fff",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
          </div>

          {/* Why this one? prompt */}
          {whyPrompt && (() => {
            const ws = SCHOOLS.find(s=>s.id===whyPrompt);
            if(!ws) return null;
            return (
              <div style={{width:Math.round(340*cardScale),marginTop:8,padding:"10px 14px 12px",background:"rgba(30,22,5,0.6)",borderTop:"1px solid rgba(212,175,55,0.18)"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:15}}>{ws.mascot}</span>
                    <span style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:10,color:"rgba(212,175,55,0.6)",letterSpacing:"0.04em"}}>Why this one?</span>
                  </div>
                  <button onClick={()=>setWhyPrompt(null)} style={{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.25)",fontSize:14,lineHeight:1,padding:"2px 4px"}}>✕</button>
                </div>
                <WhyNoteInput
                  value={notes[whyPrompt]||""}
                  onChange={v=>setNotes(n=>({...n,[whyPrompt]:v}))}
                  onDone={()=>setWhyPrompt(null)}
                  placeholder="What stood out to you..."
                />
              </div>
            );
          })()}

          {cur?.t==="ad" && <div style={{marginTop:8,fontFamily:"'Source Sans 3',sans-serif",fontSize:8,color:"rgba(255,255,255,0.18)",letterSpacing:"0.1em"}}>SPONSORED CONTENT</div>}

          {/* Dots */}
          <div style={{display:"flex",gap:3,marginTop:10,alignItems:"center",flexWrap:"wrap",justifyContent:"center",maxWidth:360,padding:"0 6px"}}>
            {SCHOOLS.filter(s=>!triage.skipped.includes(s.id)).map(s => {
              const si = visibleSeq.findIndex(x=>x.t==="school"&&x.s.id===s.id);
              return <div key={s.id} onClick={()=>setSeqIdx(si)} style={{width:activeId===s.id?15:5,height:5,borderRadius:3,background:activeId===s.id?s.accentColor:allBoardIds.includes(s.id)?"rgba(80,200,120,0.5)":triage.maybe.includes(s.id)?"rgba(212,175,55,0.4)":"rgba(255,255,255,0.13)",cursor:"pointer",transition:"all 0.3s"}}/>;
            })}
          </div>
          {triage.skipped.length>0 && (
            <button onClick={unSkipAll} style={{marginTop:3,background:"transparent",border:"none",cursor:"pointer",fontFamily:"'Source Sans 3',sans-serif",fontSize:8,color:"rgba(255,255,255,0.2)",letterSpacing:"0.1em"}}>
              {triage.skipped.length} hidden · restore all
            </button>
          )}
          <div style={{marginTop:4,fontFamily:"'Source Sans 3',sans-serif",fontSize:7,letterSpacing:"0.15em",color:"rgba(255,255,255,0.12)",textTransform:"uppercase",textAlign:"center"}}>← → arrow keys</div>
        </div>
      )}

      {view==="board" && (
        <div style={{flex:1,display:"flex",flexDirection:"column",overflowX:"hidden"}}>
          <BoardView board={board} onRemove={removeFromBoard} onMoveLane={moveLane} onReorder={reorder} onRankReorder={rankReorder} onRankMove={rankMove}/>
        </div>
      )}

      {view==="my" && (
        <MyCollegesView
          darkMode={darkMode}
          notes={notes}
          onNoteChange={(id,v)=>setNotes(n=>({...n,[id]:v}))}
          boardIds={allBoardIds}
          board={board}
          myStatus={myStatus}
          onMoveStatus={moveStatus}
          onRemoveFromBoard={removeFromBoard}
          onExpand={setExpandId}
          skipped={triage.skipped}
          onUnskip={unSkip}
          onUnskipAll={unSkipAll}
        />
      )}

      {/* FOOTER — attribution + feedback only, no nav */}
      <div style={{flexShrink:0,borderTop:"1px solid rgba(255,255,255,0.06)",padding:"5px 14px",background:"rgba(0,0,0,0.2)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:7,color:"rgba(255,255,255,0.18)",letterSpacing:"0.08em"}}>
          Rankings: US News 2025 · Data: Common Data Sets 2024–25
        </div>
        <button onClick={()=>setShowFeedback(true)} style={{background:"transparent",border:"none",cursor:"pointer",fontFamily:"'Source Sans 3',sans-serif",fontSize:9,color:"rgba(212,175,55,0.45)",letterSpacing:"0.06em"}}>💬 Feedback</button>
      </div>
    </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<CollegeCards />);

</script>
