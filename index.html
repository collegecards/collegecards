    // ─── UTILS ────────────────────────────────────────────────────────────────
    function hexToRgba(hex, alpha) {
      try {
        let h = hex.replace('#','');
        if(h.length===3) h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
        const r=parseInt(h.slice(0,2),16), g=parseInt(h.slice(2,4),16), b=parseInt(h.slice(4,6),16);
        return 'rgba('+r+','+g+','+b+','+alpha+')';
      } catch(e) { return 'rgba(0,0,0,'+alpha+')'; }
    }

    // ─── COMPONENTS ───────────────────────────────────────────────────────────
    function CollegeCard({ school, flipped, onFlip, triageStatus, onSkip, onMaybe, onInterested, onRemove }) {
      const [photoIdx, setPhotoIdx] = useState(0);
      const [fading, setFading] = useState(false);
      const { accentColor, gradFrom, gradTo, borderColor, primaryColor } = school;

      useEffect(() => {
        const t = setInterval(() => {
          setFading(true);
          setTimeout(() => { setPhotoIdx(p => (p+1) % school.scenes.length); setFading(false); }, 500);
        }, 3800);
        return () => clearInterval(t);
      }, [school.id]);

      const Scene = school.scenes[photoIdx].scene;

      return (
        <div className="card-scene" onClick={() => onFlip(!flipped)}>
          <div className={"card-inner" + (flipped ? " flipped" : "")}>
            <div className="card-face">
              <div className="cc-shell" style={{
                border: '2px solid '+borderColor,
                background: 'linear-gradient(180deg,'+hexToRgba(gradFrom,.9)+' 0%,'+gradTo+' 100%)',
              }}>
                <div className="cc-hero">
                  <div className={'scene-wrap cc-hero-scene'+(fading?' fading':'')}><Scene/></div>
                  <div className="cc-hero-grad" style={{background: 'linear-gradient(180deg,transparent 0%, '+primaryColor+' 100%)'}}/>
                </div>
                <div className="cc-content">
                  <div className="cc-rank"><span className="cc-rank-num">{school.ranking}</span></div>
                  <div className="cc-spacer"/>
                  <div className="cc-name">{school.name}</div>
                  <div className="cc-sub"><span>{school.mascot}</span>{school.subtitle}</div>
                  <div className="cc-lower">
                    <div className="cc-claim-txt">{school.claim}</div>
                    <div className="cc-btns" onClick={e=>e.stopPropagation()}>
                        <button className="cc-btn cc-btn-x" onClick={onSkip}>✕</button>
                        <button className="cc-btn cc-btn-maybe" onClick={onMaybe}>🤷</button>
                        <button className="cc-btn cc-btn-int" onClick={onInterested}>❤️</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div className="card-face card-back-face" style={{background:"#1a1408", border:"2px solid "+borderColor, padding:20}}>
               <h2 style={{color:accentColor}}>{school.name}</h2>
               <p>{school.proTip}</p>
               {school.stats.map(s => <div key={s.label}>{s.icon} {s.label}: {s.value}</div>)}
            </div>
          </div>
        </div>
      );
    }

                <div>{board.undecided.length + board.reach.length} Saved</div>
            </header>

            <main style={{flex:1, display:"flex", justifyContent:"center", alignItems:"center", padding:20}}>
              {cur.t === "welcome" && <div onClick={next}><h1>Welcome</h1><button>Start</button></div>}
              {cur.t === "search" && <div onClick={next}><h1>Search</h1><button>Skip</button></div>}
              {cur.t === "school" && (
                <CollegeCard 
                  school={cur.s} 
                  flipped={cardFlipped} 
                  onFlip={setCardFlipped}
                  onSkip={next}
                  onMaybe={next}
                  onInterested={() => {
                    setBoard(b => ({...b, undecided: [...b.undecided, cur.s.id]}));
                    next();
                  }}
                />
              )}
            </main>
          </div>
        </div>
      );
    }

    // FIX 2: Actually tell React to render the app into the #root div
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<CollegeCards />);
  </script>

  <!-- PostHog -->
  <script>
    window.addEventListener("load", function() {
      var s = document.createElement("script");
      s.src = "https://us-assets.i.posthog.com/static/array.js";
      s.onload = function() {
        window.posthog.init("phc_H7D4zcNr01nWiXk8frPVtcOkWVoetlEV3SiRHvEnh2c", {
          api_host: "https://us.i.posthog.com", autocapture: false
        });
      };
      document.head.appendChild(s);
    });
  </script>

  <style>
    /* Required for flipping and premium feel */
    .card-scene{width:340px;height:530px;perspective:1200px;}
    .card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.7s cubic-bezier(0.4,0,0.2,1);}
    .card-inner.flipped{transform:rotateY(180deg);}
    .card-face{position:absolute;inset:0;border-radius:24px;backface-visibility:hidden;overflow:hidden;}
    .card-back-face{transform:rotateY(180deg);}
    .cc-shell{height:100%;position:relative;border-radius:24px;}
    .cc-hero{height:60%;position:relative;}
    .cc-content{padding:20px;position:absolute;bottom:0;width:100%;}
    .cc-rank{background:#D4AF37; display:inline-block; padding:5px 10px; border-radius:10px; color:#000; font-weight:bold;}
    .cc-name{font-size:32px; font-weight:bold; margin-top:10px;}
    .cc-btns{display:flex; gap:10px; margin-top:20px;}
    .cc-btn{flex:1; height:50px; border-radius:12px; border:none; cursor:pointer; font-size:18px;}
    .cc-btn-int{background:#D4AF37; color:#000;}
    .cc-btn-x, .cc-btn-maybe{background:#333; color:#fff;}
    .scene-wrap{transition:opacity 0.5s;}
    .scene-wrap.fading{opacity:0;}
  </style>
</body>
