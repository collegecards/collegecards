// ─── PHOTO SCENE HELPER ────────────────────────────────────────────────────
function photoScene(url, caption) {
  return {
    caption,
    isPhoto: true,
    scene: () => (
      <img src={url} alt={caption}
        style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:"center 25%",display:"block"}}
        loading="lazy"
      />
    )
  };
}

function hexToRgba(hex, alpha) {
  try {
    let h = (hex||'').replace('#','');
    if(h.length===3) h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
    const r=parseInt(h.slice(0,2),16), g=parseInt(h.slice(2,4),16), b=parseInt(h.slice(4,6),16);
    return 'rgba('+r+','+g+','+b+','+alpha+')';
  } catch(e) { return 'rgba(0,0,0,'+alpha+')'; }
}

function CollegeCard({ school, flipped, onFlip, triageStatus, onSkip, onMaybe, onInterested, onRemove }) {
  const [photoIdx, setPhotoIdx] = useState(0);
  const [fading, setFading] = useState(false);
  const [hovStat, setHovStat] = useState(null);
  const [shareMsg, setShareMsg] = useState("");
  const touchMoved = useRef(false);
  const backScrollRef = useRef(null);
  const bsbThumbRef = useRef(null);
  const bsbTrackRef = useRef(null);
  const { accentColor, gradFrom, gradTo, borderColor, primaryColor } = school;

  useEffect(() => {
    if(!flipped) return;
    const init = () => {
      const el = backScrollRef.current;
      const track = bsbTrackRef.current;
      const thumb = bsbThumbRef.current;
      if(!el||!track||!thumb) return;
      const trackH = track.clientHeight;
      const thumbH = Math.max(24, trackH*(el.clientHeight/el.scrollHeight));
      thumb.style.height = thumbH+'px';
      thumb.style.top = '0px';
    };
    setTimeout(init, 150);
  }, [flipped, school.id]);

  useEffect(() => { setPhotoIdx(0); }, [school.id]);
  useEffect(() => {
    const t = setInterval(() => {
      setFading(true);
      setTimeout(() => { setPhotoIdx(p => (p+1) % school.scenes.length); setFading(false); }, 500);
    }, 3800);
    return () => clearInterval(t);
  }, [school.id]);

  const handleCardClick = e => {
    if(touchMoved.current) return;
    if(e.target.closest('a,button,select,input,svg,polyline,line,path')) return;
    onFlip(!flipped);
  };

  const doShare = e => {
    if(e) e.stopPropagation();
    track("school_shared", { school_id: school.id, school_name: school.name });
    const url = "https://www.collegecards.app/?school="+school.id;
    const txt = "Check out " + school.name + " on CollegeCards! " +
      school.ranking + " " + school.rankLabel + " · " +
      (school.stats.find(s=>s.label==="Acceptance Rate")?.value||"") + " acceptance\n" + url;
    const copyFallback = () => {
      const ta = document.createElement("textarea");
      ta.value = txt; ta.style.cssText = "position:fixed;top:0;left:0;opacity:0;";
      document.body.appendChild(ta); ta.focus(); ta.select();
      try { document.execCommand("copy"); setShareMsg("Copied!"); }
      catch(e2) { setShareMsg("Copy failed"); }
      document.body.removeChild(ta);
      setTimeout(() => setShareMsg(""), 2200);

const LANE_COLORS = {reach:"#e05050",match:"#D4AF37",safety:"#50c878",undecided:"#8888aa"};

function BoardView({ board, onRemove, onMoveLane, onReorder, onRankReorder, onRankMove, darkMode, suggestions, onJumpToSuggest, onSkip, onMaybe, onInterested, triage, allBoardIds }) {
  const [subView, setSubView] = useState("classify");
  const [dragging, setDragging] = useState(null);
  const [dragOver, setDragOver] = useState(null);
  const [expandId, setExpandId] = useState(null);
  const lanes = [
    {key:"undecided",label:"⚪ TBD — Needs Classification", color:"#8888aa", bg:"rgba(130,130,180,0.06)", border:"rgba(130,130,180,0.2)"},
    {key:"reach",    label:"🔴 Reach",   color:"#e05050", bg:"rgba(220,60,60,0.07)",  border:"rgba(220,60,60,0.25)"},
    {key:"match",    label:"🟡 Match",   color:"#D4AF37", bg:"rgba(212,175,55,0.07)", border:"rgba(212,175,55,0.25)"},
    {key:"safety",   label:"🟢 Safety",  color:"#50c878", bg:"rgba(60,180,90,0.07)",  border:"rgba(60,180,90,0.25)"},
  ];
  const allIds = [...(board.undecided||[]),...(board.reach||[]),...(board.match||[]),...(board.safety||[])];
  const tbdCount = (board.undecided||[]).length;
  const rankOrder = board.rankOrder || allIds;
  const rankedSchools = rankOrder.map(id=>SCHOOLS.find(s=>s.id===id)).filter(Boolean);
  const laneOf = id => ["reach","match","safety","undecided"].find(l=>(board[l]||[]).includes(id))||"undecided";
  const handleDrop = () => {
    if(dragging && dragOver) {
      if(subView==="rank") onRankReorder(dragging.id, dragOver.idx);
      else if(dragOver.lane!==dragging.fromLane) onMoveLane(dragging.id, dragOver.lane);
      else onReorder(dragging.id, dragging.fromLane, dragOver.idx);
    }
    setDragging(null); setDragOver(null);
  };

  if(allIds.length===0) return (
    <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14,padding:40}}>
      <div style={{fontSize:44}}>📋</div>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:darkMode?"rgba(255,255,255,0.45)":"rgba(0,0,0,0.4)",textAlign:"center"}}>Your Board is empty</div>
      <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:12,color:darkMode?"rgba(255,255,255,0.28)":"rgba(0,0,0,0.4)",textAlign:"center",maxWidth:280,lineHeight:1.6}}>
        Go to <strong style={{color:"rgba(255,255,255,0.5)"}}>🃏 Browse</strong>, find schools you like, and tap <strong style={{color:"#50c878"}}>❤️ Interested</strong> — they'll appear here to classify.
      </div>
    </div>
  );

  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",overflowX:"hidden"}}>
      {expandId && <FullCardModal schoolId={expandId} onClose={()=>setExpandId(null)}
        triageStatus={expandId?((allBoardIds||[]).includes(expandId)?"interested":(triage?.maybe||[]).includes(expandId)?"maybe":(triage?.skipped||[]).includes(expandId)?"skipped":null):null}
        onSkip={onSkip} onMaybe={onMaybe} onInterested={onInterested} onRemove={onRemove}/>}

      {/* Sub-nav */}
      <div style={{flexShrink:0,display:"flex",gap:6,padding:"10px 14px 0",alignItems:"center"}}>
        <button onClick={()=>setSubView("classify")}
          style={{background:subView==="classify"?"rgba(212,175,55,0.2)":(darkMode?"rgba(255,255,255,0.10)":"rgba(0,0,0,0.08)"),border:"2px solid "+(subView==="classify"?"#D4AF37":(darkMode?"rgba(255,255,255,0.30)":"rgba(0,0,0,0.25)")),color:subView==="classify"?"#D4AF37":(darkMode?"rgba(255,255,255,0.80)":"rgba(0,0,0,0.75)"),borderRadius:8,padding:"7px 14px",cursor:"pointer",fontFamily:"'Source Sans 3',sans-serif",fontSize:12,fontWeight:800,letterSpacing:"0.05em",boxShadow:subView==="classify"?"0 0 16px rgba(212,175,55,0.4)":"none"}}>
          {"🗂️ Classify"+(tbdCount>0?" ("+tbdCount+" TBD)":"")}
        </button>
        <button onClick={()=>setSubView("rank")}
          style={{background:"linear-gradient(135deg,#b8860b,#D4AF37)",border:"none",color:"#000",borderRadius:8,padding:"7px 14px",cursor:"pointer",fontFamily:"'Source Sans 3',sans-serif",fontSize:12,fontWeight:800,letterSpacing:"0.05em",boxShadow:"0 2px 14px rgba(212,175,55,0.5)",display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:18,filter:"drop-shadow(0 0 5px rgba(255,255,255,0.95))"}}>🏆</span> My Rank List
        </button>
        {tbdCount>0 && subView==="classify" && (
          <div style={{marginLeft:"auto",fontFamily:"'Source Sans 3',sans-serif",fontSize:9,color:darkMode?"rgba(212,175,55,0.6)":"rgba(160,100,0,0.8)",letterSpacing:"0.06em"}}>
            ↓ classify TBD schools below
          </div>
        )}
      </div>

      {/* CLASSIFY VIEW */}
      {subView==="classify" && (
        <div style={{flex:1,overflowY:"auto",overflowX:"hidden",padding:"10px 12px 28px"}}>
          {lanes.map(lane => {
            const cards = (board[lane.key]||[]).map(id=>SCHOOLS.find(s=>s.id===id)).filter(Boolean);
            if(cards.length===0) return null;
            return (
              <div key={lane.key}
                onDragOver={e=>{e.preventDefault();setDragOver({lane:lane.key,idx:cards.length});}}

                style={{marginBottom:14}}>
                {/* Section header */}

                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:lane.color,fontWeight:900}}>{cards.length}</div>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {cards.map((school,idx) => (
                    <div key={school.id}
                      onDragOver={e=>{e.preventDefault();e.stopPropagation();setDragOver({lane:lane.key,idx});}}
                      style={{outline:dragOver?.lane===lane.key&&dragOver?.idx===idx&&dragging?.id!==school.id?"2px dashed "+(lane.color):"none",borderRadius:12}}>
                      <MiniCard school={school} lane={lane.key} onRemove={onRemove} onMoveLane={onMoveLane} onExpand={setExpandId}
                        isDragging={dragging?.id===school.id}
                        dragHandlers={{draggable:true,onDragStart:()=>setDragging({id:school.id,fromLane:lane.key}),onDragEnd:handleDrop}}/>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
          {/* Suggested in Board — classify view */}
          {suggestions&&suggestions.length>0&&(
            <div style={{marginTop:8,marginBottom:8}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 14px",background:"rgba(212,175,55,0.08)",border:"2px solid rgba(212,175,55,0.25)",borderRadius:10,marginBottom:8}}>
                <div style={{fontFamily:"'Source Sans 3',sans-serif",fontWeight:900,fontSize:14,color:"#D4AF37"}}>✨ Suggested For You</div>
                <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:10,color:"rgba(212,175,55,0.55)"}}>based on your list</div>
              </div>
              {suggestions.map(s=>(
                <div key={s.id} onClick={()=>setExpandId(s.id)} style={{display:"flex",alignItems:"center",gap:10,background:"linear-gradient(135deg,"+s.gradFrom+","+s.primaryColor+")",border:"1px solid "+(s.accentColor+"55"),borderRadius:12,padding:"11px 13px",cursor:"pointer",marginBottom:8,boxShadow:"0 3px 14px rgba(0,0,0,0.3)"}}>
                  <span style={{fontSize:22,flexShrink:0}}>{s.mascot}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,color:"#fff",lineHeight:1.1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.name}</div>
                    <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:9,color:"rgba(255,255,255,0.6)",marginTop:2}}>{s.ranking} {s.rankLabel} · {s.stats.find(x=>x.label==="Acceptance Rate")?.value}</div>
                  </div>
                  <span style={{color:"rgba(255,255,255,0.4)",fontSize:16}}>→</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* RANK VIEW */}
      {subView==="rank" && (
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          {/* Share button — sticky at top */}
          <div style={{flexShrink:0,padding:"10px 14px 6px"}}>
          <button onClick={()=>{
            const rowH = 68;
            const W = 580;
            const headerH = 94;
            const footerH = 44;
            const H = headerH + rankedSchools.length * rowH + footerH;
            const canvas = document.createElement("canvas");
            canvas.width = W * 2; canvas.height = H * 2;
            const ctx = canvas.getContext("2d");
            ctx.scale(2, 2);
            // Background
            ctx.fillStyle = "#07040e";
            ctx.fillRect(0, 0, W, H);
            // Top gold bar
            const hg = ctx.createLinearGradient(0,0,W,0);
            hg.addColorStop(0,"#8a6000"); hg.addColorStop(0.5,"#D4AF37"); hg.addColorStop(1,"#8a6000");
            ctx.fillStyle = hg; ctx.fillRect(0, 0, W, 6);
            // Header: CollegeCards logo centered
            ctx.textAlign = "center";
            ctx.fillStyle = "#ffffff"; ctx.font = "bold 18px Georgia,serif";
            ctx.fillText("College", W/2 - 30, 34);
            ctx.fillStyle = "#D4AF37"; ctx.font = "bold 18px Georgia,serif";
            ctx.fillText("Cards", W/2 + 30, 34);
            // Divider
            ctx.strokeStyle = "rgba(212,175,55,0.25)"; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(40, 44); ctx.lineTo(W - 40, 44); ctx.stroke();
            // Title — bigger, more breathing room, no subtitle
            ctx.fillStyle = "#D4AF37"; ctx.font = "bold 34px Georgia,serif";
            ctx.fillText("My College List", W/2, 83);
            ctx.textAlign = "left";
            // Each school row
            rankedSchools.forEach((school, idx) => {
              const y = headerH + idx * rowH;
              const rx = 12, rw = W - 24, rr = 10;
              // Row background with school colors
              const bg = ctx.createLinearGradient(rx, y, rx + rw, y);
              bg.addColorStop(0, (school.gradFrom||"#180808") + "dd");
              bg.addColorStop(1, (school.primaryColor||"#280808") + "dd");
              ctx.fillStyle = bg;
              ctx.beginPath(); ctx.roundRect(rx, y + 3, rw, rowH - 6, rr); ctx.fill();
              // Left accent stripe in school accent color
              ctx.fillStyle = school.accentColor || "#D4AF37";
              ctx.beginPath(); ctx.roundRect(rx, y + 3, 4, rowH - 6, rr); ctx.fill();
              // Subtle border
              ctx.strokeStyle = (school.accentColor || "#D4AF37") + "55";
              ctx.lineWidth = 1.5;
              ctx.beginPath(); ctx.roundRect(rx, y + 3, rw, rowH - 6, rr); ctx.stroke();
              // Rank number
              ctx.fillStyle = "rgba(255,255,255,0.85)"; ctx.font = "bold 24px Georgia,serif"; ctx.textAlign = "left";
              ctx.fillText(String(idx + 1), rx + 16, y + 38);
              // Mascot — rounded square bg in school accent color, then emoji on top
              const mx = rx + 46, my = y + 10, ms = 34, mr = 7;
              const ac = school.accentColor || "#D4AF37";
              // Fill: accent color at 25% opacity
              ctx.fillStyle = ac + "40";
              ctx.beginPath(); ctx.roundRect(mx, my, ms, ms, mr); ctx.fill();
              // Border: accent color at 55% opacity
              ctx.strokeStyle = ac + "88"; ctx.lineWidth = 1.5;
              ctx.beginPath(); ctx.roundRect(mx, my, ms, ms, mr); ctx.stroke();
              // Emoji centered in box
              ctx.font = "20px 'Segoe UI Emoji','Apple Color Emoji',Arial";
              ctx.fillStyle = "#fff";
              ctx.textAlign = "center";
              ctx.fillText(school.mascot || "🏫", mx + ms/2, my + ms - 7);
              ctx.textAlign = "left";
              // School name — shifted right to account for box
              ctx.fillStyle = "#ffffff"; ctx.font = "bold 17px Georgia,serif";
              ctx.fillText(school.name, rx + 92, y + 32);
              // Subtitle
              ctx.fillStyle = school.accentColor || "#D4AF37"; ctx.font = "12px Arial";

// Analytics — PostHog loaded via <head> snippet
function track(event, props={}) {
  try {
    if(window.posthog && window.posthog.capture) {

    }

// ─── SMART SUGGESTIONS ────────────────────────────────────────────────────
function getSuggestions(interestedIds, allBoardIds, skippedIds) {
  if(interestedIds.length < 2) return [];
  const interested = interestedIds.map(id=>SCHOOLS.find(s=>s.id===id)).filter(Boolean);
  const getAccept = s => parseInt((s.stats.find(x=>x.label==="Acceptance Rate")?.value||"50").replace(/[^0-9]/g,""));
  const getRegion = s => {
    const loc = s.stats.find(x=>x.label==="Location")?.value||"";
    if(["MA","NH","VT","CT","RI","NY","NJ","PA","ME"].some(st=>loc.includes(st))) return "Northeast";
    if(["TN","NC","VA","GA","FL"].some(st=>loc.includes(st))) return "South";
    if(["OH","IN","IL","MI","WI"].some(st=>loc.includes(st))) return "Midwest";
    return "West";
  };
  const avgAccept = Math.round(interested.reduce((a,s)=>a+getAccept(s),0)/interested.length);
  const regions = interested.map(getRegion);
  const topRegion = regions.sort((a,b)=>regions.filter(r=>r===b).length-regions.filter(r=>r===a).length)[0];
  const topVibe = interested[0]?.vibes?.reduce((a,v)=>v.value>a.value?v:a,{value:0})?.label;
  const seen = new Set([...allBoardIds, ...skippedIds]);
  const candidates = SCHOOLS.filter(s=>!seen.has(s.id)).map(s=>{
    let score = 0;
    const acc = getAccept(s);
    if(Math.abs(acc-avgAccept)<=15) score+=3;
    else if(Math.abs(acc-avgAccept)<=25) score+=1;
    if(getRegion(s)===topRegion) score+=2;
    if(topVibe) { const v=s.vibes.find(v=>v.label===topVibe); if(v&&v.value>=4) score+=2; }
    return {s, score};
  }).filter(x=>x.score>=2).sort((a,b)=>b.score-a.score);
  return candidates.slice(0,3).map(x=>x.s);
}

  }, []);

  const allBoardIds = [...board.reach,...board.match,...board.safety,...board.undecided];

  // Inject suggestion card after every 5th interested school
  const suggestions = allBoardIds.length>=2 ? getSuggestions(allBoardIds, allBoardIds, triage.skipped) : [];
  const showSuggestCard = suggestions.length>0 && allBoardIds.length>suggestThreshold;
  const visibleSeq = React.useMemo(() => {
    if(!showSuggestCard) return SEQ;
    // Insert after 8th school card
    const idx = SEQ.findIndex((x,i)=>x.t==="school"&&SEQ.slice(0,i+1).filter(y=>y.t==="school").length===8);
    if(idx<0) return [...SEQ, {t:"suggest",suggestions:suggestions}];
    return [...SEQ.slice(0,idx+1), {t:"suggest",suggestions:suggestions}, ...SEQ.slice(idx+1)];
  }, [suggestions.length, suggestThreshold, allBoardIds.length, triage.skipped.length]);

  const cur = visibleSeq[seqIdx % visibleSeq.length];
  const school = cur?.t==="school" ? cur.s : null;
  const activeId = school?.id;

  const prev = () => {
    setSeqIdx(i => {
      const n = (i-1+visibleSeq.length)%visibleSeq.length;
      const item = visibleSeq[n];
      if(item?.t !== "school") setCardFlipped(false);
      if(item?.t === "school") {
        sessionViews.current++;
        track("card_viewed", { school_id: item.s.id, school_name: item.s.name, direction: "prev", session_card_count: sessionViews.current });
      }
      return n;
    });
  };
  const next = () => {
    setSeqIdx(i => {
      const n = (i+1)%visibleSeq.length;
      const item = visibleSeq[n];
      if(item?.t !== "school") setCardFlipped(false);
      if(item?.t === "school") {
        sessionViews.current++;
        track("card_viewed", { school_id: item.s.id, school_name: item.s.name, direction: "next", session_card_count: sessionViews.current });
      }
      return n;
    });
  };
  const surpriseMe = () => {
    const schoolItems = visibleSeq.filter(x=>x.t==="school");
    if(!schoolItems.length) return;
    const pick = schoolItems[Math.floor(Math.random()*schoolItems.length)];
    const idx = visibleSeq.indexOf(pick);
    setSeqIdx(idx);
  };

  useEffect(() => {
    const h = e => {
      if(view!=="browse"||showFeedback) return;
      if(e.key==="ArrowLeft") prev();
      if(e.key==="ArrowRight") next();
    };
    window.addEventListener("keydown",h);
    return () => window.removeEventListener("keydown",h);
  }, [view,showFeedback,visibleSeq.length]);

  useEffect(() => {
    const ks = e => {
      const {triage:tr, allBoardIds:ab, school:s, cardFlipped:cf, view:v, showFeedback:sf,
             markInterested:mi, markMaybe:mm, markSkip:ms, removeFromBoard:rfb} = liveRef.current;
      if(v!=="browse"||sf) return;
      if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA") return;
      if(e.key==="f"||e.key==="F") { setCardFlipped(x=>!x); return; }
      if(cf||!s) return;
      const ts = ab.includes(s.id)?"interested":tr.maybe.includes(s.id)?"maybe":tr.skipped.includes(s.id)?"skipped":null;
      if(e.key==="i"||e.key==="I") { ts==="interested"?rfb(s.id):mi(s.id); }
      if(e.key==="m"||e.key==="M") mm(s.id);
      if(e.key==="s"||e.key==="S") ms(s.id);
    };
    window.addEventListener("keydown",ks);
    return ()=>window.removeEventListener("keydown",ks);
  }, []);

  // Triage actions
  const markInterested = id => {
    if(allBoardIds.includes(id)) return;
    setBoard(b=>({...b,undecided:[...b.undecided,id],rankOrder:[...b.rankOrder,id]}));
    setTriage(t=>({...t,maybe:t.maybe.filter(x=>x!==id),skipped:t.skipped.filter(x=>x!==id)}));
    sessionTriaged.current++;
    track("school_triaged", { school_id: id, action: "interested", board_size: allBoardIds.length+1, session_views: sessionViews.current, pct_triaged: sessionViews.current > 0 ? Math.round((sessionTriaged.current/sessionViews.current)*100) : 0 });
    setCardFlipped(false);
    setTimeout(() => setWhyPrompt(id), 800);
  };
  const markMaybe = id => {
    setTriage(t => {
      if(t.maybe.includes(id)) {
        track("school_triaged", { school_id: id, action: "unmaybe", session_views: sessionViews.current });
        return {...t, maybe:t.maybe.filter(x=>x!==id)};
      } else {
        sessionTriaged.current++;
        track("school_triaged", { school_id: id, action: "maybe", session_views: sessionViews.current });
        setCardFlipped(false);
        return {...t, maybe:[...t.maybe,id], skipped:t.skipped.filter(x=>x!==id)};
      }
    });
  };
  const markSkip = id => {
    setTriage(t => {
      if(t.skipped.includes(id)) {
        track("school_triaged", { school_id: id, action: "unskip", session_views: sessionViews.current });
        return {...t, skipped:t.skipped.filter(x=>x!==id)};
      } else {
        sessionTriaged.current++;
        setCardFlipped(false);
        track("school_triaged", { school_id: id, action: "skip", session_views: sessionViews.current });
        return {...t, skipped:[...t.skipped,id], maybe:t.maybe.filter(x=>x!==id)};
      }
    });
  };
  const unSkipAll = () => setTriage(t=>({...t,skipped:[]}));
  const unSkip = id => setTriage(t=>({...t,skipped:t.skipped.filter(x=>x!==id)}));

  // Board actions
  const removeFromBoard = id => {
    setBoard(b=>({reach:b.reach.filter(x=>x!==id),match:b.match.filter(x=>x!==id),safety:b.safety.filter(x=>x!==id),undecided:b.undecided.filter(x=>x!==id),rankOrder:b.rankOrder.filter(x=>x!==id)}));
  };
  const moveLane = (id,toLane) => {
    setBoard(b=>{const c={reach:b.reach.filter(x=>x!==id),match:b.match.filter(x=>x!==id),safety:b.safety.filter(x=>x!==id),undecided:b.undecided.filter(x=>x!==id),rankOrder:b.rankOrder};return{...c,[toLane]:[...c[toLane],id]};});
    if(toLane !== "undecided") track("school_classified", { school_id: id, lane: toLane, board_size: allBoardIds.length });
    // Fire board_completed when last TBD gets classified
    if(toLane !== "undecided" && board.undecided.filter(x=>x!==id).length === 0 && allBoardIds.length > 0) {
      track("board_completed", { board_size: allBoardIds.length, reach: board.reach.length, match: board.match.length, safety: board.safety.length });
    }
  };
  const reorder = (id,lane,to) => setBoard(b=>{const a=b[lane].filter(x=>x!==id);a.splice(to,0,id);return{...b,[lane]:a};});
  const rankReorder = (id,to) => setBoard(b=>{const a=b.rankOrder.filter(x=>x!==id);a.splice(Math.max(0,Math.min(to,a.length)),0,id);return{...b,rankOrder:a};});
  const rankMove = (id,dir) => setBoard(b=>{const a=[...b.rankOrder];const i=a.indexOf(id);const j=i+dir;if(i<0||j<0||j>=a.length)return b;[a[i],a[j]]=[a[j],a[i]];return{...b,rankOrder:a};});

  // My status actions
  const moveStatus = (id, toStage) => {
    setMyStatus(m=>{
      const cleaned={applying:m.applying.filter(x=>x!==id),applied:m.applied.filter(x=>x!==id)};
      if(toStage==="interested") return cleaned; // just remove from applying/applied
      return{...cleaned,[toStage]:[...cleaned[toStage],id]};
    });
  };

  const jumpTo = id => {
    const idx = visibleSeq.findIndex(x=>x.t==="school"&&x.s.id===id);
    if(idx>=0){setSeqIdx(idx);setView("browse");}
  };
  const shortName = s => s.id==="bc"?"BC":s.id==="bu"?"BU":s.id==="berklee"?"Berklee":s.name.split(" ")[0];
  const totalBoard = allBoardIds.length;
  const totalMy = allBoardIds.length; // same — My Colleges IS the board list

  const handleTouchStart = e => { touchStart.current = e.touches[0].clientX; touchStartY.current = e.touches[0].clientY; };
  const handleTouchEnd = e => {
    if(touchStart.current===null) return;
    const dx = e.changedTouches[0].clientX - touchStart.current;
    touchStart.current = null;
    const dy = e.changedTouches[0].clientY - (touchStartY.current||0);
    if(Math.abs(dx)<60 || Math.abs(dx)<Math.abs(dy)*1.5) return;
    if(dx<0) next(); else prev();
  };

  const isInterested = school && allBoardIds.includes(school.id);
  const isMaybe = school && triage.maybe.includes(school.id);
  const isSkipped = school && triage.skipped.includes(school.id);
  const isTriaged = isInterested || isMaybe || isSkipped;

  const triageStatus = school
    ? allBoardIds.includes(school.id) ? "interested"
    : triage.maybe.includes(school.id) ? "maybe"
    : triage.skipped.includes(school.id) ? "skipped"
    : null
    : null;

  const CSS = [
    '',
    '    @import url(\'https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@300;400;600&display=swap\');',
    '    body{overscroll-behavior:none;overflow-x:hidden;}',
    '    .card-scene{width:340px;height:530px;perspective:1200px;cursor:pointer;touch-action:pan-y;}',
    '    .card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.75s cubic-bezier(0.4,0.2,0.2,1);}',
    '    .card-inner.flipped{transform:rotateY(180deg);}',
    '    .card-face{position:absolute;inset:0;border-radius:18px;backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:hidden;}',
    '    .card-back-face{transform:rotateY(180deg);}',
    '    .card-scene:hover .card-inner:not(.flipped){transform:rotateY(5deg) rotateX(-2deg) scale(1.01);}',
    '    .card-scene:hover .card-inner.flipped{transform:rotateY(185deg) rotateX(-2deg) scale(1.01);}',
    '    .scene-wrap{width:100%;height:100%;transition:opacity 0.5s ease;}',
    '    .scene-wrap.fading{opacity:0;}',
    '    .shine{position:absolute;inset:0;background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,0.06) 50%,transparent 60%);pointer-events:none;z-index:2;}',
    '    .dot{width:6px;height:6px;border-radius:50%;transition:background 0.3s;cursor:pointer;}',
    '    .btn-skip,.btn-maybe,.btn-int{transition:all 0.15s;}',
    '    @media(hover:hover){.btn-skip:hover{border-color:rgba(255,80,80,0.7);background:rgba(80,15,20,0.8)!important;}.btn-maybe:hover{border-color:rgba(233,196,88,0.75);}.btn-int:hover{opacity:0.9;}}',
    '    .stab{cursor:pointer;transition:all 0.18s;border-radius:7px;padding:4px 8px;font-family:\'Source Sans 3\',sans-serif;font-size:9px;letter-spacing:0.06em;text-transform:uppercase;border:1px solid transparent;white-space:nowrap;}',
    '    .stab:hover{opacity:0.88;}',
    '    .tab-btn{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;flex:1;position:relative;}',
    '    .tab-badge{position:absolute;top:2px;right:calc(50% - 18px);background:#e05050;border-radius:10px;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;font-weight:700;padding:0 3px;}',
    '    ::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:2px;}',
    '    .search-scroll::-webkit-scrollbar{display:none;}',
    '    .search-scroll{scrollbar-width:none;}',
    '    .back-scroll::-webkit-scrollbar{display:none;}',
    '    .back-scroll{scrollbar-width:none;}' ,

  ].join("\n");
  const NavTab = ({id, icon, label, badge}) => {
    const active = view===id;
    return (
      <button className="tab-btn" onClick={()=>setView(id)}>
        {badge>0 && <span className="tab-badge">{badge}</span>}
        <span style={{fontSize:22}}>{icon}</span>
        <span style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:10,fontWeight:active?700:400,color:active?"#D4AF37":"rgba(255,255,255,0.7)",letterSpacing:"0.05em"}}>{label}</span>
        {active && <div style={{position:"absolute",bottom:0,left:"50%",transform:"translateX(-50%)",width:20,height:2,background:"#D4AF37",borderRadius:1}}/>}
      </button>
    );
  };

  return (
    <div style={{display:"flex",justifyContent:"center",minHeight:"100vh",background:"#000"}}>
    <div style={{width:"100%",maxWidth:430,minHeight:"100vh",maxHeight:"100vh",background:darkMode?"radial-gradient(ellipse at 55% 40%,#120808 0%,#080510 50%,#000 100%)":"linear-gradient(180deg,#f0ece4 0%,#e8e2d8 100%)",display:"flex",flexDirection:"column",overflowX:"hidden",position:"relative"}}>
      <style>{CSS}</style>

      {expandId && <FullCardModal schoolId={expandId} onClose={()=>setExpandId(null)}
        triageStatus={expandId?(allBoardIds.includes(expandId)?"interested":triage.maybe.includes(expandId)?"maybe":triage.skipped.includes(expandId)?"skipped":null):null}
        onSkip={markSkip} onMaybe={markMaybe} onInterested={markInterested} onRemove={removeFromBoard}/>}

      {showFeedback && (
        <div onClick={()=>setShowFeedback(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.82)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:20}}>
          <div onClick={e=>e.stopPropagation()} style={{background:darkMode?"#141420":"#faf7f2",border:"1px solid rgba(212,175,55,0.4)",borderRadius:14,padding:22,maxWidth:340,width:"100%"}}>
            {fbSent ? (
              <div style={{textAlign:"center",padding:"14px 0"}}>
                <div style={{fontSize:34,marginBottom:10}}>🙏</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:"#D4AF37",marginBottom:6}}>Thank you!</div>
                <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:11,color:darkMode?"rgba(255,255,255,0.45)":"rgba(0,0,0,0.55)"}}>Your feedback helps us improve.</div>
                <button onClick={()=>{setShowFeedback(false);setFbSent(false);setFbText("");}} style={{marginTop:14,background:"rgba(212,175,55,0.15)",border:"1px solid rgba(212,175,55,0.4)",borderRadius:7,padding:"7px 18px",cursor:"pointer",color:"#D4AF37",fontFamily:"'Source Sans 3',sans-serif",fontSize:11}}>Close</button>
              </div>
            ) : (
              <>
                <div style={{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:17,color:darkMode?"#fff":"#1a1208",marginBottom:5}}>Share Feedback</div>
                <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:10,color:darkMode?"rgba(255,255,255,0.38)":"rgba(0,0,0,0.55)",marginBottom:12}}>What would make CollegeCards better for you?</div>
                <textarea value={fbText} onChange={e=>setFbText(e.target.value)} placeholder="Ideas, bugs, missing schools..." style={{width:"100%",minHeight:80,background:darkMode?"rgba(255,255,255,0.05)":"rgba(0,0,0,0.04)",border:"1px solid "+(darkMode?"rgba(255,255,255,0.14)":"rgba(0,0,0,0.15)"),borderRadius:7,padding:9,color:darkMode?"#fff":"#1a1208",fontFamily:"'Source Sans 3',sans-serif",fontSize:11,resize:"vertical",boxSizing:"border-box",outline:"none"}}/>
                <div style={{display:"flex",gap:7,marginTop:9}}>
                  <button onClick={()=>setShowFeedback(false)} style={{flex:1,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:7,padding:"8px 0",cursor:"pointer",color:darkMode?"rgba(255,255,255,0.38)":"rgba(0,0,0,0.4)",fontFamily:"'Source Sans 3',sans-serif",fontSize:11}}>Cancel</button>
                  <button onClick={()=>{if(fbText.trim())setFbSent(true);}} style={{flex:2,background:"rgba(212,175,55,0.15)",border:"1px solid rgba(212,175,55,0.5)",borderRadius:7,padding:"8px 0",cursor:"pointer",color:"#D4AF37",fontFamily:"'Source Sans 3',sans-serif",fontSize:11,fontWeight:600}}>Send →</button>
                </div>
              </>
            )}
          </div>
        </div>
      )}

      {/* SLIM TOP BAR */}
      <div style={{flexShrink:0,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 10px",borderBottom:"1px solid "+(darkMode?"rgba(255,255,255,0.07)":"rgba(0,0,0,0.1)")}}>
        <div style={{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:20,color:darkMode?"#fff":"#1a1208",letterSpacing:"0.04em",cursor:"pointer",flexShrink:0}} onClick={()=>{setSeqIdx(0);setView("browse");}}>
          College<span style={{color:"#D4AF37"}}>Cards</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
          <button onClick={()=>{const idx=visibleSeq.findIndex(x=>x.t==="search");if(idx>=0)setSeqIdx(idx);setView("browse");}}
            style={{background:"rgba(212,175,55,0.12)",border:"1.5px solid rgba(212,175,55,0.5)",borderRadius:20,padding:"6px 11px",cursor:"pointer",fontFamily:"'Source Sans 3',sans-serif",fontSize:11,color:"#D4AF37",fontWeight:600,display:"flex",alignItems:"center",gap:4,flexShrink:0,whiteSpace:"nowrap"}}>
            🔍 Search
          </button>
          <div style={{display:"flex",gap:8,alignItems:"flex-start"}}>
            <div onClick={()=>setView("browse")} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer"}}>
              <div style={{background:view==="browse"?"rgba(212,175,55,0.12)":(darkMode?"rgba(255,255,255,0.06)":"rgba(0,0,0,0.06)"),border:"2px solid "+(view==="browse"?"#D4AF37":darkMode?"rgba(255,255,255,0.22)":"rgba(0,0,0,0.18)"),borderRadius:8,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",fontSize:19}}>🏫</div>
              <span style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:8,color:view==="browse"?"#D4AF37":darkMode?"rgba(255,255,255,0.4)":"rgba(0,0,0,0.5)",fontWeight:700,letterSpacing:"0.04em"}}>BROWSE</span>
            </div>
            <div onClick={()=>setView("board")} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer",position:"relative"}}>
              <div style={{background:darkMode?"rgba(255,255,255,0.06)":"rgba(0,0,0,0.06)",border:"2px solid "+(view==="board"?"#D4AF37":darkMode?"rgba(255,255,255,0.22)":"rgba(0,0,0,0.18)"),borderRadius:8,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",fontSize:19}}>📋</div>
              <span style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:8,color:view==="board"?"#D4AF37":darkMode?"rgba(255,255,255,0.4)":"rgba(0,0,0,0.5)",fontWeight:700,letterSpacing:"0.04em"}}>BOARD</span>
              {totalBoard>0 && <span style={{position:"absolute",top:-5,right:-5,background:"#e05050",borderRadius:10,minWidth:16,height:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:darkMode?"#fff":"#1a1208",fontWeight:700,padding:"0 3px"}}>{totalBoard}</span>}
            </div>
            <div onClick={()=>setView("my")} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer"}}>
              <div style={{background:darkMode?"rgba(255,255,255,0.06)":"rgba(0,0,0,0.06)",border:"2px solid "+(view==="my"?"#D4AF37":darkMode?"rgba(255,255,255,0.22)":"rgba(0,0,0,0.18)"),borderRadius:9,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,filter:darkMode?"drop-shadow(0 0 6px rgba(255,255,255,0.7))":"none"}}>🎓</div>
              <span style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:8,color:view==="my"?"#D4AF37":darkMode?"rgba(255,255,255,0.4)":"rgba(0,0,0,0.5)",fontWeight:700,letterSpacing:"0.04em"}}>MY SCHOOLS</span>
            </div>
          </div>
          <button onClick={()=>setDarkMode(d=>!d)} style={{background:darkMode?"rgba(255,255,255,0.08)":"rgba(0,0,0,0.08)",border:"1px solid "+(darkMode?"rgba(255,255,255,0.18)":"rgba(0,0,0,0.18)"),borderRadius:18,padding:"5px 9px",cursor:"pointer",fontSize:14,flexShrink:0,lineHeight:1,boxShadow:darkMode?"none":"0 1px 3px rgba(0,0,0,0.12)"}}>{ darkMode?"☀️":"🌙"}</button>
        </div>
      </div>

      {/* BROWSE */}
      {view==="browse" && (
        <div onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}
          style={{flex:1,overflowY:"auto",overflowX:"hidden",display:"flex",flexDirection:"column",alignItems:"center",padding:"12px 10px 12px"}}>
          {/* Card with overlaid arrows */}
          <div style={{position:"relative",width:340}}>
            <button onClick={prev} style={{position:"absolute",left:-14,top:240,zIndex:10,background:"rgba(0,0,0,0.6)",border:"1px solid rgba(255,255,255,0.18)",borderRadius:"50%",width:30,height:30,cursor:"pointer",color:"#fff",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
            {cur?.t==="welcome" && (
              <div style={{transform:`scale(${cardScale})`,transformOrigin:"top center",width:340,height:530,marginBottom:`${530*(cardScale-1)}px`}}>
                <WelcomeCard onDismiss={next}/>
              </div>
            )}
            {cur?.t==="search"  && (
              <div style={{transform:`scale(${cardScale})`,transformOrigin:"top center",width:340,height:530,marginBottom:`${530*(cardScale-1)}px`}}>
                <SearchCard onResult={id=>{jumpTo(id);}} onSurprise={()=>{surpriseMe();next();}} onJumpIn={()=>next()} darkMode={darkMode}/>
              </div>
            )}
            {cur?.t==="ad"      && (
              <div style={{transform:`scale(${cardScale})`,transformOrigin:"top center",width:340,height:530,marginBottom:`${530*(cardScale-1)}px`}}>
                <AdCard ad={cur.ad}/>
              </div>
            )}
            {cur?.t==="suggest" && (
              <div style={{transform:`scale(${cardScale})`,transformOrigin:"top center",width:340,height:530,marginBottom:`${530*(cardScale-1)}px`}}>
                <SuggestionCard suggestions={cur.suggestions} onDismiss={next} onHide={()=>{setSuggestThreshold(t=>allBoardIds.length+3);next();}} onExpand={setExpandId}/>
              </div>
            )}

            {cur?.t==="school"  && (
              <div style={{transform:`scale(${cardScale})`,transformOrigin:"top center",width:340,height:530,marginBottom:`${530*(cardScale-1)}px`}}>
                <CollegeCard key={school.id} school={school} flipped={cardFlipped} onFlip={setCardFlipped}
                  triageStatus={triageStatus}
                  onSkip={()=>markSkip(school.id)}
                  onMaybe={()=>markMaybe(school.id)}
                  onInterested={()=>markInterested(school.id)}
                  onRemove={()=>removeFromBoard(school.id)}
                />
              </div>
            )}
            <button onClick={next} style={{position:"absolute",right:-14,top:240,zIndex:10,background:"rgba(0,0,0,0.6)",border:"1px solid rgba(255,255,255,0.18)",borderRadius:"50%",width:30,height:30,cursor:"pointer",color:"#fff",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
          </div>

          {cur?.t==="ad" && <div style={{marginTop:8,fontFamily:"'Source Sans 3',sans-serif",fontSize:8,color:darkMode?"rgba(255,255,255,0.18)":"rgba(0,0,0,0.3)",letterSpacing:"0.1em"}}>SPONSORED CONTENT</div>}

          {cur?.t==="school" && (() => {
            const total = SEQ.filter(x=>x.t==="school").length;
            const seen = Math.min(seqIdx+1, total);
            const pct = Math.round((seen/total)*100);
            return (
              <div style={{width:Math.round(340*cardScale),marginTop:8,display:"flex",alignItems:"center",gap:8}}>
                <div style={{flex:1,height:3,borderRadius:2,background:darkMode?"rgba(255,255,255,0.1)":"rgba(0,0,0,0.1)",overflow:"hidden"}}>
                  <div style={{height:"100%",width:pct+"%",background:"linear-gradient(90deg,#b8860b,#D4AF37)",borderRadius:2,transition:"width 0.4s"}}/>
                </div>
                <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:9,color:darkMode?"rgba(255,255,255,0.35)":"rgba(0,0,0,0.4)",whiteSpace:"nowrap"}}>{seen}/{total}</div>
              </div>
            );
          })()}

          {/* Dots */}
          <div style={{display:"flex",gap:3,marginTop:10,alignItems:"center",flexWrap:"wrap",justifyContent:"center",maxWidth:360,padding:"0 6px"}}>
            {SCHOOLS.filter(s=>!triage.skipped.includes(s.id)).map(s => {
              const si = visibleSeq.findIndex(x=>x.t==="school"&&x.s.id===s.id);
              return <div key={s.id} onClick={()=>setSeqIdx(si)} style={{width:activeId===s.id?15:5,height:5,borderRadius:3,background:activeId===s.id?s.accentColor:allBoardIds.includes(s.id)?"rgba(80,200,120,0.5)":triage.maybe.includes(s.id)?"rgba(212,175,55,0.4)":"rgba(255,255,255,0.13)",cursor:"pointer",transition:"all 0.3s"}}/>;
            })}
          </div>
          {triage.skipped.length>0 && (
            <button onClick={unSkipAll} style={{marginTop:3,background:"transparent",border:"none",cursor:"pointer",fontFamily:"'Source Sans 3',sans-serif",fontSize:8,color:darkMode?"rgba(255,255,255,0.2)":"rgba(0,0,0,0.25)",letterSpacing:"0.1em"}}>
              {triage.skipped.length} hidden · restore all
            </button>
          )}
          <div style={{marginTop:4,fontFamily:"'Source Sans 3',sans-serif",fontSize:7,letterSpacing:"0.15em",color:"rgba(255,255,255,0.12)",textTransform:"uppercase",textAlign:"center"}}>← → arrow keys</div>
        </div>
      )}

      {view==="board" && (
        <div style={{flex:1,display:"flex",flexDirection:"column",overflowX:"hidden"}}>
          <BoardView board={board} onRemove={removeFromBoard} onMoveLane={moveLane} onReorder={reorder} onRankReorder={rankReorder} onRankMove={rankMove} darkMode={darkMode} suggestions={suggestions} onJumpToSuggest={id=>{setSuggestReturnIdx(true);jumpTo(id);setView("browse");}} onSkip={markSkip} onMaybe={markMaybe} onInterested={markInterested} triage={triage} allBoardIds={allBoardIds}/>
        </div>
      )}

      {view==="my" && (
        <MyCollegesView
          darkMode={darkMode}
          suggestions={suggestions}
          notes={notes}
          onNoteChange={(id,v)=>setNotes(n=>({...n,[id]:v}))}
          onSkip={markSkip} onMaybe={markMaybe} onInterested={markInterested}
          triage={triage} allBoardIds={allBoardIds}
          boardIds={allBoardIds}
          board={board}
          myStatus={myStatus}
          onMoveStatus={moveStatus}
          onRemoveFromBoard={removeFromBoard}
          onExpand={setExpandId}
          skipped={triage.skipped}
          onUnskip={unSkip}
          onUnskipAll={unSkipAll}
        />
      )}

      {/* FOOTER — attribution + feedback only, no nav */}
      <div style={{flexShrink:0,borderTop:"1px solid rgba(255,255,255,0.06)",padding:"5px 14px",background:"rgba(0,0,0,0.2)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:7,color:darkMode?"rgba(255,255,255,0.18)":"rgba(0,0,0,0.35)",letterSpacing:"0.08em"}}>
          Rankings: US News 2025 · Data: Common Data Sets 2024–25
        </div>
        <button onClick={()=>setShowFeedback(true)} style={{background:"transparent",border:"none",cursor:"pointer",fontFamily:"'Source Sans 3',sans-serif",fontSize:9,color:darkMode?"rgba(212,175,55,0.45)":"rgba(160,100,0,0.7)",letterSpacing:"0.06em"}}>💬 Feedback</button>
      </div>

      {whyPrompt && (()=>{
        const ws=SCHOOLS.find(s=>s.id===whyPrompt);
        if(!ws) return null;
        return (<div style={{position:"fixed",bottom:kbOffset,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:darkMode?"linear-gradient(180deg,rgba(18,12,2,0.97),rgba(12,8,0,0.99))":"linear-gradient(180deg,rgba(255,250,240,0.98),rgba(250,245,235,0.99))",borderTop:"1px solid rgba(212,175,55,0.25)",padding:"10px 16px 20px",zIndex:999,boxShadow:"0 -4px 24px rgba(0,0,0,0.6)"}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}><div style={{display:"flex",alignItems:"center",gap:7}}><span style={{fontSize:16}}>{ws.mascot}</span><span style={{fontFamily:"'Source Sans 3',sans-serif",fontSize:11,color:darkMode?"rgba(212,175,55,0.65)":"rgba(160,100,0,0.8)"}}>{ws.name}</span></div><button onClick={()=>setWhyPrompt(null)} style={{background:"none",border:"none",cursor:"pointer",color:darkMode?"rgba(255,255,255,0.3)":"rgba(0,0,0,0.3)",fontSize:16,lineHeight:1,padding:"2px 6px"}}>✕</button></div><WhyNoteInput value={notes[whyPrompt]||""} onChange={v=>setNotes(n=>({...n,[whyPrompt]:v}))} onDone={()=>setWhyPrompt(null)} placeholder="What stood out to you..."/></div>);
      })()}
    </div>
    </div>
  );
}
