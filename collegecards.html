<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="Discover your perfect college — browse, swipe, and build your list with CollegeCards." />
  <title>CollegeCards</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🃏</text></svg>" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
      color: #fff;
      overflow-x: hidden;
      height: 100vh;
      user-select: none;
    }
    
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(10px);
      padding: 12px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 500px;
      margin: 0 auto;
    }
    
    .logo {
      font-size: 24px;
      font-weight: 800;
      color: #fff;
    }
    
    .nav {
      display: flex;
      gap: 20px;
    }
    
    .nav-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      cursor: pointer;
      padding: 8px 0;
      transition: color 0.2s;
    }
    
    .nav-btn.active {
      color: #fff;
      border-bottom: 2px solid #fff;
    }
    
    .main {
      padding-top: 70px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    .card-container {
      position: relative;
      width: 350px;
      height: 500px;
      perspective: 1000px;
    }
    
    .card {
      position: absolute;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.6s;
      cursor: pointer;
    }
    
    .card.flipped {
      transform: rotateY(180deg);
    }
    
    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 20px;
      overflow: hidden;
    }
    
    .card-front {
      background: linear-gradient(135deg, var(--grad-from, #1a1a1a) 0%, var(--primary-color, #2d2d2d) 100%);
      border: 2px solid var(--border-color, rgba(255,255,255,0.2));
      display: flex;
      flex-direction: column;
      padding: 24px;
    }
    
    .card-back {
      transform: rotateY(180deg);
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      padding: 24px;
      display: flex;
      flex-direction: column;
    }
    
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }
    
    .school-info h2 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    
    .school-info p {
      font-size: 14px;
      opacity: 0.8;
    }
    
    .mascot {
      font-size: 32px;
    }
    
    .card-number {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(0,0,0,0.6);
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }
    
    .campus-scene {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 16px 0;
      border-radius: 12px;
      background: rgba(255,255,255,0.1);
      min-height: 160px;
    }
    
    .campus-placeholder {
      font-size: 48px;
      opacity: 0.6;
    }
    
    .claim {
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent-color, #fff);
      margin-bottom: 18px;
      line-height: 1.3;
    }
    
    .vibe-bars {
      margin-bottom: 20px;
    }
    
    .vibe-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    
    .vibe-label {
      font-size: 12px;
      opacity: 0.8;
      width: 90px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .bars {
      display: flex;
      gap: 3px;
    }
    
    .bar {
      width: 14px;
      height: 5px;
      border-radius: 2px;
      background: rgba(255,255,255,0.2);
    }
    
    .bar.filled {
      background: var(--accent-color, #fff);
    }
    
    .actions {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }
    
    .action-btn {
      flex: 1;
      padding: 12px 8px;
      border: none;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-skip {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }
    
    .btn-maybe {
      background: rgba(255,193,7,0.2);
      color: #ffc107;
    }
    
    .btn-interested {
      background: rgba(40,167,69,0.2);
      color: #28a745;
    }
    
    .action-btn:hover {
      transform: translateY(-2px);
    }
    
    .welcome {
      text-align: center;
      padding: 40px;
    }
    
    .welcome h1 {
      font-size: 32px;
      margin-bottom: 16px;
    }
    
    .welcome p {
      font-size: 18px;
      opacity: 0.8;
      margin-bottom: 32px;
    }
    
    .start-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 16px 32px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
    }
    
    .board {
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    
    .board-section {
      margin-bottom: 30px;
    }
    
    .board-section h3 {
      font-size: 18px;
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 12px;
      background: var(--section-color, rgba(255,255,255,0.1));
    }
    
    .school-list {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    }
    
    .school-item {
      background: rgba(255,255,255,0.1);
      padding: 16px;
      border-radius: 12px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.2s;
    }
    
    .school-item:hover {
      border-color: rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }
    
    .school-item h4 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .school-item p {
      font-size: 12px;
      opacity: 0.8;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .stat {
      background: rgba(255,255,255,0.1);
      padding: 12px;
      border-radius: 8px;
      text-align: center;
    }
    
    .stat-label {
      font-size: 10px;
      opacity: 0.7;
      margin-bottom: 4px;
    }
    
    .stat-value {
      font-size: 14px;
      font-weight: 600;
    }
    
    .pro-tip {
      background: rgba(255,255,255,0.1);
      padding: 16px;
      border-radius: 12px;
      margin-top: 16px;
    }
    
    .pro-tip h4 {
      font-size: 12px;
      margin-bottom: 8px;
      opacity: 0.8;
    }
    
    .pro-tip p {
      font-size: 13px;
      line-height: 1.4;
    }
    
    .finished {
      text-align: center;
      padding: 40px;
    }
    
    .finished h2 {
      font-size: 24px;
      margin-bottom: 16px;
    }
    
    .finished p {
      font-size: 16px;
      opacity: 0.8;
      margin-bottom: 32px;
    }
    
    .counter {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(0,0,0,0.6);
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }
    
    @media (max-width: 400px) {
      .card-container {
        width: 320px;
        height: 460px;
      }
      
      .card-front {
        padding: 20px;
      }
      
      .school-info h2 {
        font-size: 16px;
      }
    }
  </style>
</head>

    // Utility functions
    const formatAcceptanceRate = (rate) => {
      const num = parseFloat(rate);
      if (num < 0.1) return `${(num * 100).toFixed(1)}%`;
      return `${Math.round(num * 100)}%`;
    };

    const formatSalary = (salary) => {
      const num = parseInt(salary);
      if (num >= 1000) return `$${Math.round(num / 1000)}K`;
      return `$${num}`;
    };

    // Components
    function VibeBar({ value, color }) {
      return (
        <div className="bars">
          {[1, 2, 3, 4, 5].map(i => (
            <div
              key={i}
              className={`bar ${i <= value ? 'filled' : ''}`}
              style={{ '--accent-color': i <= value ? color : 'rgba(255,255,255,0.2)' }}
            />
          ))}
        </div>
      );
    }

    function SchoolCard({ school, onAction, currentIndex, totalSchools }) {
      const [flipped, setFlipped] = useState(false);

      const handleAction = (action) => {
        onAction(school.id, action);
      };

      const cardStyle = {
        '--primary-color': school.primaryColor,
        '--grad-from': school.gradFrom || school.primaryColor,
        '--border-color': school.borderColor,
        '--accent-color': school.accentColor
      };

      return (
        <div className="card-container">
          <div className={`card ${flipped ? 'flipped' : ''}`} style={cardStyle}>
            {/* Front of card */}
            <div className="card-face card-front" onClick={() => setFlipped(!flipped)}>
              <div className="card-number">{school.cardNumber}</div>
              <div className="counter">{currentIndex + 1} of {totalSchools}</div>
              
              <div className="card-header">
                <div className="school-info">
                  <h2>{school.name}</h2>
                  <p>{school.subtitle}</p>
                </div>
                <div className="mascot">{school.emoji}</div>
              </div>

              <div className="campus-scene">
                <div className="campus-placeholder">🏛️</div>
              </div>

              <div className="claim">{school.claimToFame}</div>

              <div className="vibe-bars">
                <div className="vibe-row">
                  <div className="vibe-label">🎊 Spirit</div>
                  <VibeBar value={school.vibeSchoolSpirit} color={school.accentColor} />
                </div>
                <div className="vibe-row">
                  <div className="vibe-label">📚 Academics</div>
                  <VibeBar value={school.vibeAcademics} color={school.accentColor} />
                </div>
                <div className="vibe-row">
                  <div className="vibe-label">🎉 Social</div>
                  <VibeBar value={school.vibeSocialScene} color={school.accentColor} />
                </div>
                <div className="vibe-row">
                  <div className="vibe-label">🏛️ Campus</div>
                  <VibeBar value={school.vibeCampusBeauty} color={school.accentColor} />
                </div>
              </div>

              <div className="actions">
                <button className="action-btn btn-skip" onClick={(e) => { e.stopPropagation(); handleAction('skip'); }}>
                  ✕ Skip
                </button>
                <button className="action-btn btn-maybe" onClick={(e) => { e.stopPropagation(); handleAction('maybe'); }}>
                  🤷 Maybe
                </button>
                <button className="action-btn btn-interested" onClick={(e) => { e.stopPropagation(); handleAction('interested'); }}>
                  ❤️ Yes
                </button>
              </div>
            </div>

            {/* Back of card */}
            <div className="card-face card-back" onClick={() => setFlipped(!flipped)}>
              <div className="card-header">
                <div className="school-info">
                  <h2>{school.name}</h2>
                  <p>{school.tier} • {school.usNewsRank} {school.rankLabel}</p>
                </div>
              </div>

              <div className="stats-grid">
                <div className="stat">
                  <div className="stat-label">Acceptance Rate</div>
                  <div className="stat-value">{formatAcceptanceRate(school.acceptanceRate)}</div>
                </div>
                <div className="stat">
                  <div className="stat-label">Avg GPA</div>
                  <div className="stat-value">{school.avgGPA || 'N/A'}</div>
                </div>
                <div className="stat">
                  <div className="stat-label">SAT Range</div>
                  <div className="stat-value">{school.satRange || 'N/A'}</div>
                </div>
                <div className="stat">
                  <div className="stat-label">Total Cost</div>
                  <div className="stat-value">{school.totalCost}</div>
                </div>
                <div className="stat">
                  <div className="stat-label">Location</div>
                  <div className="stat-value">{school.location}</div>
                </div>
                <div className="stat">
                  <div className="stat-label">Size</div>
                  <div className="stat-value">{school.size}</div>
                </div>
              </div>

              <div className="stat">
                <div className="stat-label">Top Majors</div>
                <div className="stat-value" style={{ fontSize: '12px' }}>{school.topMajors}</div>
              </div>

              <div className="pro-tip">
                <h4>💡 Pro Tip</h4>
                <p>{school.proTip}</p>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function WelcomeScreen({ onStart }) {
      return (
        <div className="welcome">
          <h1>🃏 CollegeCards</h1>
          <p>Discover your perfect college match.<br />Swipe through schools, build your list.</p>
          <button className="start-btn" onClick={onStart}>
            Start Exploring
          </button>
        </div>
      );
    }

    function BoardView({ interestedSchools, maybeSchools }) {
      const interested = interestedSchools.map(id => SCHOOLS_DATA.find(s => s.id === id));
      const maybe = maybeSchools.map(id => SCHOOLS_DATA.find(s => s.id === id));

      return (
        <div className="board">
          <div className="board-section">
            <h3 style={{ '--section-color': 'rgba(40,167,69,0.2)', color: '#28a745' }}>
              ❤️ Interested ({interested.length})
            </h3>
            <div className="school-list">
              {interested.map(school => school && (
                <div key={school.id} className="school-item">
                  <h4>{school.name}</h4>
                  <p>{school.subtitle}</p>
                  <p style={{ fontSize: '11px', marginTop: '4px' }}>{school.tier} • {school.usNewsRank}</p>
                </div>
              ))}
              {interested.length === 0 && (
                <p style={{ opacity: 0.6, fontStyle: 'italic' }}>No schools yet. Keep browsing!</p>
              )}
            </div>
          </div>

          <div className="board-section">
            <h3 style={{ '--section-color': 'rgba(255,193,7,0.2)', color: '#ffc107' }}>
              🤷 Maybe ({maybe.length})
            </h3>
            <div className="school-list">
              {maybe.map(school => school && (
                <div key={school.id} className="school-item">
                  <h4>{school.name}</h4>
                  <p>{school.subtitle}</p>
                  <p style={{ fontSize: '11px', marginTop: '4px' }}>{school.tier} • {school.usNewsRank}</p>
                </div>
              ))}
              {maybe.length === 0 && (
                <p style={{ opacity: 0.6, fontStyle: 'italic' }}>No schools yet. Keep browsing!</p>
              )}
            </div>
          </div>
        </div>
      );
    }

    function FinishedView({ interestedSchools, maybeSchools, onRestart }) {
      return (
        <div className="finished">
          <h2>🎉 All Done!</h2>
          <p>
            You've looked at all {SCHOOLS_DATA.length} schools.<br />
            ❤️ {interestedSchools.length} interested • 🤷 {maybeSchools.length} maybe
          </p>
          <button className="start-btn" onClick={onRestart}>
            View My Board
          </button>
        </div>
      );
    }

    function App() {
      const [view, setView] = useState('welcome'); // 'welcome', 'browse', 'board', 'finished'
      const [currentSchoolIndex, setCurrentSchoolIndex] = useState(0);
      const [interestedSchools, setInterestedSchools] = useState([]);
      const [maybeSchools, setMaybeSchools] = useState([]);

      const handleAction = (schoolId, action) => {
        if (action === 'interested') {
          setInterestedSchools(prev => [...prev, schoolId]);
        } else if (action === 'maybe') {
          setMaybeSchools(prev => [...prev, schoolId]);
        }
        // 'skip' does nothing but advance

        const nextIndex = currentSchoolIndex + 1;
        if (nextIndex >= SCHOOLS_DATA.length) {
          setView('finished');
        } else {
          setCurrentSchoolIndex(nextIndex);
        }
      };

      const handleRestart = () => {
        setView('board');
      };

      const currentSchool = SCHOOLS_DATA[currentSchoolIndex];

      return (
        <>
          <header className="header">
            <div className="header-content">
              <div className="logo">🃏 CollegeCards</div>
              <nav className="nav">
                <button 
                  className={`nav-btn ${view === 'browse' ? 'active' : ''}`}
                  onClick={() => view !== 'welcome' && setView('browse')}
                >
                  Browse
                </button>
                <button 
                  className={`nav-btn ${view === 'board' ? 'active' : ''}`}
                  onClick={() => view !== 'welcome' && setView('board')}
                >
                  Board
                </button>
              </nav>
            </div>
          </header>

          <main className="main">
            {view === 'welcome' && (
              <WelcomeScreen onStart={() => setView('browse')} />
            )}

            {view === 'browse' && currentSchool && (
              <SchoolCard 
                school={currentSchool} 
                onAction={handleAction}
                currentIndex={currentSchoolIndex}
                totalSchools={SCHOOLS_DATA.length}
              />
            )}

            {view === 'board' && (
              <BoardView 
                interestedSchools={interestedSchools}
                maybeSchools={maybeSchools}
              />
            )}

            {view === 'finished' && (
              <FinishedView 
                interestedSchools={interestedSchools}
                maybeSchools={maybeSchools}
                onRestart={handleRestart}
              />
            )}
          </main>
        </>
      );
    }

    // Initialize app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
